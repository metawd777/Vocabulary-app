<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Vocabulary">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>Vocabulary • Финальная версия</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family: system-ui, -apple-system, sans-serif; }
        body { background:#f1f5f9; color:#0f172a; display:flex; flex-direction:column; }
        .dark body { background:#0f172a; color:#f1f5f9; }
        ::-webkit-scrollbar { display:none; }
        .touch-target { min-height:48px; min-width:48px; }

        .header-top { padding-top: max(env(safe-area-inset-top,12px),12px); flex-shrink:0; z-index:10; color:#0f172a; }
        .dark .header-top { color:#f1f5f9; }
        #main-content { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0 16px; padding-bottom:0; }
        .bottom-nav { flex-shrink:0; padding-bottom:env(safe-area-inset-bottom,0); background:white; border-top:1px solid #e2e8f0; }
        .dark .bottom-nav { background:#0f172a; border-top-color:#1e293b; }
        .bottom-nav button { color:#475569; }
        .dark .bottom-nav button { color:#cbd5e1; }

        .theme-btn {
            width:44px; height:44px; display:flex; align-items:center; justify-content:center;
            border-radius:9999px; font-size:1.5rem; background:transparent; color:#64748b;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1); border:none; cursor:pointer;
        }
        .dark .theme-btn { color:#94a3b8; }
        .theme-btn.active {
            background-color: #0d9488 !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.5) !important;
            transform: scale(1.12);
            border: 2px solid #14b8a6;
        }
        .dark .theme-btn.active {
            background-color: #14b8a6 !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.6) !important;
            border: 2px solid #5eead4;
            transform: scale(1.12);
        }

        .study-card {
            background: white; border-radius: 24px; border: 1px solid #e2e8f0;
            padding: 20px 16px; min-height: 200px; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
            max-width: 100%;
            overflow: hidden;
        }
        .dark .study-card { background:#1e293b; border-color:#334155; }

        .study-card .word-english,
        .study-card .word-russian {
            max-width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            text-align: center;
            padding: 0 4px;
            line-height: 1.3;
            width: 100%;
        }
        .study-card .word-english { font-size: 2.5rem; }
        .study-card .word-russian { font-size: 2rem; }

        @media (max-width: 480px) {
            .study-card .word-english { font-size: 2rem; }
            .study-card .word-russian { font-size: 1.6rem; }
        }

        .study-container { display: flex; flex-direction: column; height: 100%; padding-top: 4px; }
        .study-card-wrapper { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }

        .study-card .image-area { width: 100%; max-width: 200px; margin-bottom: 12px; position: relative; }
        .study-card .image-area img { width: 100%; max-height: 140px; object-fit: contain; border-radius: 16px; }
        .study-card .image-placeholder {
            width: 100%; max-width: 200px; height: 70px; border: 2px dashed #cbd5e1; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; color: #94a3b8; gap: 8px; cursor: pointer; margin-bottom: 12px;
        }
        .dark .study-card .image-placeholder { border-color: #475569; }

        .study-card .speak-btn { color: #0d9488; font-size: 1.5rem; margin-top: 4px; background: none; border: none; cursor: pointer; }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-enter { animation: cardEnter 0.28s cubic-bezier(0.16,1,0.3,1); }

        @keyframes flipPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .flip-pulse { animation: flipPulse 0.22s ease; }

        .progress-bar-track { height:8px; background:#e2e8f0; border-radius:9999px; overflow:hidden; }
        .dark .progress-bar-track { background:#334155; }
        .progress-bar-fill { height:100%; background:#0d9488; border-radius:9999px; transition: width 0.35s cubic-bezier(0.16,1,0.3,1); }

        .rating-buttons { flex-shrink:0; padding-top:12px; padding-bottom:12px; display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
        .rating-btn { padding:12px 0; border-radius:16px; font-weight:500; font-size:1rem; text-align:center; transition:transform 0.1s; border:none; cursor:pointer; }
        .rating-btn:active { transform:scale(0.95); }
        .progress-area { font-size:0.875rem; color:#64748b; }
        .dark .progress-area { color:#94a3b8; }
        .scrollable-content { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
        .modal-content { max-height:90vh; overflow-y:auto; }

        .dark .study-card,
        .dark .bg-white {
            background-color: #1e293b !important;
            border-color: #334155 !important;
        }
        .dark .text-slate-600,
        .dark .text-slate-500 { color:#94a3b8 !important; }
        .dark .border-slate-200 { border-color:#334155 !important; }
        .dark .text-slate-400 { color:#94a3b8 !important; }
        .dark .study-card .word-english { color:#f1f5f9; }
        .dark .study-card .word-russian { color:#2dd4bf; }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100">

    <!-- Шапка -->
    <div class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 header-top">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-teal-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-graduation-cap text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-semibold">Vocabulary</h1>
                    <div id="current-folder-name" class="text-xs text-teal-600 dark:text-teal-400 font-medium"></div>
                </div>
            </div>
            <div class="flex bg-slate-200 dark:bg-slate-800 rounded-full p-1">
                <button onclick="setTheme('light')" id="btn-light" class="theme-btn touch-target"><i class="fa-solid fa-sun"></i></button>
                <button onclick="setTheme('dark')" id="btn-dark" class="theme-btn touch-target"><i class="fa-solid fa-moon"></i></button>
                <button onclick="setTheme('auto')" id="btn-auto" class="theme-btn touch-target"><i class="fa-solid fa-magic"></i></button>
            </div>
        </div>
    </div>

    <div id="main-content" class="max-w-3xl mx-auto w-full"></div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav max-w-3xl mx-auto w-full">
        <div class="grid grid-cols-4 text-center py-1 text-xs">
            <button onclick="showFoldersView()" id="nav-folders" class="flex flex-col items-center py-1 text-slate-600 dark:text-slate-300 touch-target">
                <i class="fa-solid fa-folder text-xl mb-0.5"></i><span>Колоды</span>
            </button>
            <button onclick="startStudy()" id="nav-study" class="flex flex-col items-center py-1 text-slate-600 dark:text-slate-300 touch-target">
                <i class="fa-solid fa-graduation-cap text-xl mb-0.5"></i><span>Учить</span>
            </button>
            <button onclick="showStatsView()" id="nav-stats" class="flex flex-col items-center py-1 text-slate-600 dark:text-slate-300 touch-target">
                <i class="fa-solid fa-chart-simple text-xl mb-0.5"></i><span>Статистика</span>
            </button>
            <button onclick="showSettingsView()" id="nav-settings" class="flex flex-col items-center py-1 text-slate-600 dark:text-slate-300 touch-target">
                <i class="fa-solid fa-gear text-xl mb-0.5"></i><span>Настройки</span>
            </button>
        </div>
    </div>

    <!-- Модалка просмотра карточки -->
    <div id="cardViewModal" onclick="hideCardViewModal()" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6 modal-content">
            <div id="card-view-content" class="text-center"></div>
            <div class="flex gap-3 mt-6">
                <button onclick="editFromViewModal()" class="flex-1 py-3 rounded-2xl border border-slate-300 dark:border-slate-600 flex items-center justify-center gap-x-2 text-base touch-target">
                    <i class="fa-solid fa-edit"></i> <span>Редактировать</span>
                </button>
                <button onclick="resetFromViewModal()" class="flex-1 py-3 rounded-2xl border border-red-200 text-red-600 flex items-center justify-center gap-x-2 text-base touch-target">
                    <i class="fa-solid fa-undo"></i> <span>Сбросить</span>
                </button>
            </div>
            <button onclick="hideCardViewModal()" class="mt-3 w-full py-3 text-sm text-slate-500 touch-target">Закрыть</button>
        </div>
    </div>

    <!-- Модалка редактирования -->
    <div id="editModal" onclick="hideEditModal()" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[440px] rounded-t-3xl sm:rounded-3xl p-6 modal-content">
            <div class="font-semibold text-xl mb-4">Редактировать карточку</div>
            <div class="space-y-3">
                <div><label class="block text-sm mb-1">Передняя сторона</label>
                    <textarea id="edit-english" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-base touch-target" rows="2"></textarea>
                </div>
                <div><label class="block text-sm mb-1">Обратная сторона</label>
                    <textarea id="edit-russian" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-base touch-target" rows="2"></textarea>
                </div>
            </div>
            <div class="mt-4">
                <button onclick="resetCardProgressFromModal()" class="w-full py-3 rounded-xl border border-red-200 text-red-600 flex items-center justify-center gap-x-2 text-sm touch-target">
                    <i class="fa-solid fa-undo"></i> <span>Сбросить прогресс</span>
                </button>
            </div>
            <details class="mt-3">
                <summary class="cursor-pointer text-sm text-slate-500 dark:text-slate-400">Дополнительные параметры (FSRS)</summary>
                <div class="pt-3 grid grid-cols-2 gap-3">
                    <div><label class="block text-xs mb-1">Стабильность</label><input type="number" step="0.01" id="edit-stability" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800"></div>
                    <div><label class="block text-xs mb-1">Сложность</label><input type="number" step="0.01" id="edit-difficulty" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800"></div>
                    <div><label class="block text-xs mb-1">Статус</label>
                        <select id="edit-state" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800">
                            <option value="new">Новая</option>
                            <option value="learning">Изучается</option>
                            <option value="review">На повторении</option>
                            <option value="relearning">Переучивается</option>
                        </select>
                    </div>
                    <div><label class="block text-xs mb-1">След. повторение</label><input type="date" id="edit-next-date" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800"></div>
                </div>
            </details>
            <div class="flex gap-3 mt-4">
                <button onclick="hideEditModal()" class="flex-1 py-3 rounded-xl border border-slate-300 dark:border-slate-600 text-base touch-target">Отмена</button>
                <button onclick="saveEditedCard()" class="flex-1 py-3 rounded-xl bg-teal-600 text-white font-medium text-base touch-target">Сохранить</button>
            </div>
            <button onclick="deleteCurrentCard()" class="mt-2 w-full py-2 text-red-600 text-sm touch-target">Удалить карточку</button>
        </div>
    </div>

    <!-- Модалка добавления -->
    <div id="addCardModal" onclick="hideAddCardModal()" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6">
            <div class="font-semibold text-xl mb-4">Добавить слово</div>
            <div class="space-y-3">
                <div><label class="block text-sm mb-1">Передняя сторона</label>
                    <textarea id="new-english" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-base touch-target" rows="2"></textarea>
                </div>
                <div><label class="block text-sm mb-1">Обратная сторона</label>
                    <textarea id="new-russian" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800 text-base touch-target" rows="2"></textarea>
                </div>
            </div>
            <div class="flex gap-3 mt-4">
                <button onclick="hideAddCardModal()" class="flex-1 py-3 rounded-xl border border-slate-300 dark:border-slate-600 text-base touch-target">Отмена</button>
                <button onclick="addNewCard()" class="flex-1 py-3 rounded-xl bg-teal-600 text-white font-medium text-base touch-target">Добавить</button>
            </div>
        </div>
    </div>

    <!-- Модалка достижения -->
    <div id="achievementModal" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]">
        <div class="bg-white dark:bg-slate-800 w-full sm:w-[380px] rounded-t-3xl sm:rounded-3xl p-6 text-center">
            <div id="achievement-icon" class="w-20 h-20 mx-auto rounded-full bg-amber-100 dark:bg-amber-900/40 flex items-center justify-center text-4xl mb-3">🏆</div>
            <div class="text-sm text-amber-600 dark:text-amber-400 font-medium mb-1">Новое достижение!</div>
            <div id="achievement-title" class="text-xl font-semibold mb-1"></div>
            <div id="achievement-desc" class="text-sm text-slate-500 dark:text-slate-400 mb-4"></div>
            <button onclick="hideAchievementModal()" class="w-full py-3 rounded-2xl bg-teal-600 text-white font-medium text-base touch-target">Отлично!</button>
        </div>
    </div>

    <!-- Модалка выбора колоды для сброса прогресса -->
    <div id="resetFolderSelectionModal" onclick="hideResetFolderSelectionModal()" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6 modal-content">
            <div class="font-semibold text-xl mb-4">Выберите колоду для сброса прогресса</div>
            <div class="space-y-2" id="reset-folder-list"></div>
            <button onclick="hideResetFolderSelectionModal()" class="mt-4 w-full py-3 rounded-2xl border border-slate-300 dark:border-slate-600 text-base touch-target">Отмена</button>
        </div>
    </div>

    <script>
        // ==================== localforage ====================
        localforage.config({ name: 'VocabularyDB', storeName: 'vocab_store' });

        let folders = [];
        let currentFolderId = 'default';
        let currentCardIndex = 0;
        let dueCards = [];
        let initialDueCount = 0;
        let editingCardId = null;
        let viewingCardId = null;
        let stats = { studyDates: [], unlocked: {}, dailyStats: {}, consecutiveCorrect: 0, maxConsecutiveCorrect: 0, totalFlips: 0, totalImages: 0 };

        // ==================== ХРАНЕНИЕ ====================
        async function loadData() {
            try {
                const stored = await localforage.getItem('folders');
                if (stored && Array.isArray(stored) && stored.length > 0) {
                    folders = stored;
                } else {
                    folders = [{ id: 'default', name: 'Основная колода', cards: [] }];
                    await localforage.setItem('folders', folders);
                }
                if (!folders.some(f => f.id === currentFolderId)) {
                    currentFolderId = folders[0].id;
                }
            } catch (e) {
                console.warn('Ошибка загрузки', e);
                folders = [{ id: 'default', name: 'Основная колода', cards: [] }];
            }
        }

        async function saveData() {
            try {
                await localforage.setItem('folders', folders);
            } catch (e) {
                console.error('Ошибка сохранения:', e);
                alert('Не удалось сохранить данные. Возможно, закончилось место на устройстве.');
            }
        }

        async function loadStats() {
            try {
                const stored = await localforage.getItem('stats');
                if (stored && typeof stored === 'object') {
                    stats = {
                        studyDates: stored.studyDates || [],
                        unlocked: stored.unlocked || {},
                        dailyStats: stored.dailyStats || {},
                        consecutiveCorrect: stored.consecutiveCorrect || 0,
                        maxConsecutiveCorrect: stored.maxConsecutiveCorrect || 0,
                        totalFlips: stored.totalFlips || 0,
                        totalImages: stored.totalImages || 0
                    };
                }
            } catch (e) {
                console.warn('Ошибка загрузки статистики', e);
            }
        }

        async function saveStats() {
            try {
                await localforage.setItem('stats', stats);
            } catch (e) {
                console.error('Ошибка сохранения статистики:', e);
            }
        }

        // ==================== ХЕЛПЕРЫ ДЛЯ СТАТИСТИКИ ====================
        function localDateKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        async function recordStudyActivity() {
            const key = localDateKey(new Date());
            if (!stats.studyDates.includes(key)) {
                stats.studyDates.push(key);
                await saveStats();
            }
        }

        function currentStreak() {
            if (!stats.studyDates || stats.studyDates.length === 0) return 0;
            const daySet = new Set(stats.studyDates);
            let streak = 0;
            let cursor = new Date();
            if (!daySet.has(localDateKey(cursor))) {
                cursor = addDays(cursor, -1);
            }
            while (daySet.has(localDateKey(cursor))) {
                streak++;
                cursor = addDays(cursor, -1);
            }
            return streak;
        }

        function getTodayStats() {
            const key = localDateKey(new Date());
            return stats.dailyStats?.[key] || null;
        }

        // ==================== ТРЕКИНГ АКТИВНОСТИ ====================
        async function recordReviewOutcome(grade) {
            const key = localDateKey(new Date());
            if (!stats.dailyStats) stats.dailyStats = {};
            if (!stats.dailyStats[key]) {
                stats.dailyStats[key] = { total: 0, correct: 0, grades: [], usedAllGrades: false };
            }
            const today = stats.dailyStats[key];
            today.total++;
            if (grade >= 3) {
                today.correct++;
                stats.consecutiveCorrect++;
                if (stats.consecutiveCorrect > stats.maxConsecutiveCorrect) {
                    stats.maxConsecutiveCorrect = stats.consecutiveCorrect;
                }
            } else {
                stats.consecutiveCorrect = 0;
            }
            if (!today.grades.includes(grade)) {
                today.grades.push(grade);
                if (today.grades.length === 4) today.usedAllGrades = true;
            }
            await saveStats();
        }

        async function recordFlip() {
            stats.totalFlips = (stats.totalFlips || 0) + 1;
            await saveStats();
        }

        async function recordPhotoAdded() {
            stats.totalImages = (stats.totalImages || 0) + 1;
            await saveStats();
        }

        // ==================== ВЫЧИСЛЕНИЕ ГЛОБАЛЬНОЙ СТАТИСТИКИ ====================
        function computeGlobalStats() {
            let total = 0, statNew = 0, statLearning = 0, statReview = 0, statRelearning = 0;
            let totalReps = 0, totalLapses = 0, stabilitySum = 0, stabilityCount = 0;
            let totalImages = stats.totalImages || 0;
            let totalFlips = stats.totalFlips || 0;
            let maxConsecutiveCorrect = stats.maxConsecutiveCorrect || 0;

            folders.forEach(f => f.cards.forEach(c => {
                total++;
                if (c.state === 'learning') statLearning++;
                else if (c.state === 'review') statReview++;
                else if (c.state === 'relearning') statRelearning++;
                else statNew++;
                totalReps += c.reps || 0;
                totalLapses += c.lapses || 0;
                if (typeof c.stability === 'number') { stabilitySum += c.stability; stabilityCount++; }
            }));
            const percentCorrect = totalReps > 0 ? Math.max(0, Math.round((1 - totalLapses / totalReps) * 100)) : null;
            const avgStability = stabilityCount > 0 ? (stabilitySum / stabilityCount) : null;
            const learnedCount = statReview + statRelearning;
            const todayStats = getTodayStats();

            return { total, statNew, statLearning, statReview, statRelearning, totalReps, totalLapses, percentCorrect, avgStability, learnedCount, totalImages, totalFlips, maxConsecutiveCorrect, todayStats };
        }

        // ==================== ДОСТИЖЕНИЯ (27 шт.) ====================
        const ACHIEVEMENTS = [
            // === ОБЪЁМ (прогрессивный) ===
            { id: 'first_step', icon: '🌱', title: 'Первый шаг', desc: 'Выучить 1 слово (довести до «На повторении»)',
                category: 'Объём', check: (g) => g.learnedCount >= 1 },
            { id: 'novice', icon: '📗', title: 'Новичок', desc: '10 слов на повторении',
                category: 'Объём', check: (g) => g.learnedCount >= 10 },

        // ==================== БЕЗОПАСНЫЙ ВЫВОД ТЕКСТА ====================
        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function escJs(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        // ==================== ОСТАЛЬНЫЕ ФУНКЦИИ ====================
        function getCurrentFolder() {
            return folders.find(f => f.id === currentFolderId) || folders[0];
        }

        // ==================== FSRS-4.5 ====================
        const FSRS_W = [0.40255, 1.18385, 3.173, 15.69105, 7.1949, 0.5345, 1.4604, 0.0046, 1.54575, 0.1192, 1.01925, 1.9395, 0.11, 0.29605, 2.2698, 0.2315, 2.9898, 0.51655, 0.6621];
        const FSRS_FACTOR = 19 / 81;
        const FSRS_DECAY = -0.5;
        const REQUESTED_RETENTION = 0.9;
        const LEARNING_STEPS_MIN = [10, 60, 240];
        const RELEARN_STEPS_MIN = [10, 60];

        function clampDifficulty(d) { return Math.min(10, Math.max(1, d)); }
        function fsrsRetrievability(elapsedDays, stability) {
            if (!stability || stability <= 0) return 0;
            return Math.pow(1 + FSRS_FACTOR * (elapsedDays / stability), FSRS_DECAY);
        }
        function fsrsIntervalDays(stability) {
            return (stability / FSRS_FACTOR) * (Math.pow(REQUESTED_RETENTION, 1 / FSRS_DECAY) - 1);
        }
        function fsrsInitialStability(grade) { return FSRS_W[grade - 1]; }
        function fsrsInitialDifficulty(grade) {
            return clampDifficulty(FSRS_W[4] - Math.exp(FSRS_W[5] * (grade - 1)) + 1);
        }
        function fsrsNextDifficulty(d, grade) {
            const deltaD = -FSRS_W[6] * (grade - 3);
            const dPrime = d + deltaD * ((10 - d) / 9);
            const easyD0 = fsrsInitialDifficulty(4);
            return clampDifficulty(FSRS_W[7] * easyD0 + (1 - FSRS_W[7]) * dPrime);
        }
        function fsrsNextStabilityOnSuccess(d, s, r, grade) {
            const tD = 11 - d;
            const tS = Math.pow(s, -FSRS_W[9]);
            const tR = Math.exp(FSRS_W[10] * (1 - r)) - 1;
            const hardPenalty = grade === 2 ? FSRS_W[15] : 1;
            const easyBonus = grade === 4 ? FSRS_W[16] : 1;
            const c = Math.exp(FSRS_W[8]);
            const alpha = 1 + tD * tS * tR * hardPenalty * easyBonus * c;
            return s * alpha;
        }
        function fsrsNextStabilityOnFail(d, s, r) {
            const dF = Math.pow(d, -FSRS_W[12]);
            const sF = Math.pow(s + 1, FSRS_W[13]) - 1;
            const rF = Math.exp(FSRS_W[14] * (1 - r));
            const newS = dF * sF * rF * FSRS_W[11];
            return Math.min(newS, s);
        }
        function addMinutes(date, minutes) { return new Date(date.getTime() + minutes * 60000); }
        function addDays(date, days) { return new Date(date.getTime() + days * 86400000); }
        function fuzzDays(days) {
            const fuzz = 1 + (Math.random() * 0.1 - 0.05);
            return Math.max(1, days * fuzz);
        }

        async function updateCardAfterReview(card, grade) {
            const now = new Date();
            if (!card.state) card.state = 'new';
            if (typeof card.reps === 'undefined') card.reps = 0;
            if (typeof card.lapses === 'undefined') card.lapses = 0;
            card.reps++;

            let elapsedDays = 0;
            if (card.last_review) {
                elapsedDays = Math.max(0, (now - new Date(card.last_review)) / 86400000);
            }

            if (card.state === 'new' || card.state === 'learning') {
                const step = card.learningStep || 0;
                if (grade === 1) {
                    card.state = 'learning'; card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[0]).toISOString();
                } else if (grade === 2) {
                    card.state = 'learning'; card.learningStep = step;
                    card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[step] * 1.5).toISOString();
                } else if (grade === 3) {
                    const nextStep = step + 1;
                    if (nextStep >= LEARNING_STEPS_MIN.length) {
                        card.state = 'review';
                        card.stability = fsrsInitialStability(3);
                        card.difficulty = fsrsInitialDifficulty(3);
                        delete card.learningStep;
                        const interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                        card.nextReviewDate = addDays(now, interval).toISOString();
                    } else {
                        card.state = 'learning'; card.learningStep = nextStep;
                        card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[nextStep]).toISOString();
                    }
                } else {
                    card.state = 'review';
                    card.stability = fsrsInitialStability(4);
                    card.difficulty = fsrsInitialDifficulty(4);
                    delete card.learningStep;
                    const interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                    card.nextReviewDate = addDays(now, interval).toISOString();
                }
            } else if (card.state === 'relearning') {
                const step = card.learningStep || 0;
                if (grade === 1) {
                    card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[0]).toISOString();
                } else if (grade === 2) {
                    card.learningStep = step;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[step] * 1.5).toISOString();
                } else {
                    const nextStep = step + 1;
                    if (grade === 4 || nextStep >= RELEARN_STEPS_MIN.length) {
                        card.state = 'review';
                        delete card.learningStep;
                        const interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                        card.nextReviewDate = addDays(now, interval).toISOString();
                    } else {
                        card.learningStep = nextStep;
                        card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[nextStep]).toISOString();
                    }
                }
            } else {
                const r = fsrsRetrievability(elapsedDays, card.stability);
                if (grade === 1) {
                    card.lapses++;
                    const newStability = fsrsNextStabilityOnFail(card.difficulty, card.stability, r);
                    card.difficulty = fsrsNextDifficulty(card.difficulty, 1);
                    card.stability = newStability;
                    card.state = 'relearning';
                    card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[0]).toISOString();
                } else {
                    const newStability = fsrsNextStabilityOnSuccess(card.difficulty, card.stability, r, grade);
                    card.difficulty = fsrsNextDifficulty(card.difficulty, grade);
                    card.stability = newStability;
                    const interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                    card.nextReviewDate = addDays(now, interval).toISOString();
                }
            }
            card.last_review = now.toISOString();
            await saveData();
        }

        function makeFreshCardProgress() {
            return { state: 'new', reps: 0, lapses: 0, stability: undefined, difficulty: undefined, learningStep: undefined, last_review: null, nextReviewDate: new Date().toISOString() };
        }

        function resetCardProgress(card) {
            card.state = 'new';
            card.reps = 0;
            card.lapses = 0;
            delete card.stability;
            delete card.difficulty;
            delete card.learningStep;
            card.last_review = null;
            card.nextReviewDate = new Date().toISOString();

        function getDueCards(folder) {
            const now = new Date();
            return folder.cards
                .filter(card => new Date(card.nextReviewDate) <= now)
                .sort((a, b) => new Date(a.nextReviewDate) - new Date(b.nextReviewDate));
        }

        function getTimeUntilNextReview(cards) {
            if (!cards || cards.length === 0) return null;
            const now = new Date();
            let soonest = cards.reduce((min, c) => new Date(c.nextReviewDate) < new Date(min.nextReviewDate) ? c : min);
            const diffMs = new Date(soonest.nextReviewDate) - now;
            if (diffMs <= 0) return { text: "сейчас", date: new Date(soonest.nextReviewDate) };
            const minutes = Math.floor(diffMs / 60000);
            const hours = Math.floor(diffMs / 3600000);
            const days = Math.floor(diffMs / 86400000);
            let text = days > 0 ? `через ${days} ${days === 1 ? 'день' : days < 5 ? 'дня' : 'дней'}` :
                       hours > 0 ? `через ${hours} ${hours === 1 ? 'час' : hours < 5 ? 'часа' : 'часов'}` :
                       `через ${minutes} ${minutes === 1 ? 'минуту' : minutes < 5 ? 'минуты' : 'минут'}`;
            return { text, date: new Date(soonest.nextReviewDate) };
        }

        // ==================== СЖАТИЕ ИЗОБРАЖЕНИЙ ====================
        function compressImage(file, maxWidth = 600, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function compressAndSetImage(card, file) {
            const compressed = await compressImage(file);
            card.image = compressed;
            await saveData();
            await recordPhotoAdded();
            await checkAchievements();
        }

        // ==================== ТЕМА ====================
        function setTheme(mode) {
            const html = document.documentElement;
            localStorage.setItem('themeMode', mode);

            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));

            let isDark;
            if (mode === 'light') {
                isDark = false;
                html.classList.remove('dark');
                document.getElementById('btn-light')?.classList.add('active');
            } else if (mode === 'dark') {
                isDark = true;
                html.classList.add('dark');
                document.getElementById('btn-dark')?.classList.add('active');
            } else {
                document.getElementById('btn-auto')?.classList.add('active');
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                html.classList.toggle('dark', isDark);
            }

            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) metaTheme.setAttribute('content', isDark ? '#0f172a' : '#ffffff');
        }

        function initTheme() {
            const saved = localStorage.getItem('themeMode') || 'auto';
            setTheme(saved);

            const media = window.matchMedia('(prefers-color-scheme: dark)');
            media.addEventListener('change', () => {
                if (localStorage.getItem('themeMode') === 'auto') {
                    setTheme('auto');
                }
            });
        }

        // ==================== ПОИСК ====================
        function searchWords(query) {
            if (!query || query.length < 1) return [];
            const q = query.toLowerCase();
            const results = [];
            folders.forEach(folder => {
                folder.cards.forEach(card => {
                    if (card.english.toLowerCase().includes(q) || card.russian.toLowerCase().includes(q)) {
                        results.push({ ...card, folderName: folder.name, folderId: folder.id });
                    }
                });
            });
            return results;
        }

        // ==================== UI ФУНКЦИИ ====================
        async function showFoldersView(initialQuery = '') {
            document.getElementById('current-folder-name').textContent = 'Мои колоды';
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="scrollable-content px-1 pt-2">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-xl font-semibold">Мои колоды</h2>

                            <i class="fa-solid fa-plus"></i> <span>Создать</span>
                        </button>
                    </div>
                    <div class="mb-3">
                        <div class="relative">
                            <input type="text" id="search-input" placeholder="Поиск по всем колодам..." class="w-full px-4 py-3 pl-10 rounded-2xl border border-slate-200 dark:border-slate-700 dark:bg-slate-900 text-base touch-target" value="${initialQuery}">
                            <i class="fa-solid fa-search absolute left-3 top-3.5 text-slate-400"></i>
                        </div>
                    </div>
                    <div id="search-results"></div>
                </div>
            `;

            const searchInput = document.getElementById('search-input');
            const resultsDiv = document.getElementById('search-results');

            function renderResults(query) {
                if (!query || query.length < 1) {
                    resultsDiv.innerHTML = `
                        <div class="grid grid-cols-1 gap-3">
                            ${folders.map(f => `
                                <div onclick="selectFolder('${f.id}')" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-4 cursor-pointer touch-target">
                                    <div class="flex justify-between items-center">
                                        <div>
                                            <div class="font-semibold text-lg">${escapeHtml(f.name)}</div>
                                            <div class="text-sm text-slate-500 dark:text-slate-400">${f.cards.length} слов</div>
                                        </div>
                                        <div class="flex items-center gap-x-3">
                                            <button onclick="event.stopImmediatePropagation(); showRenameFolderModal('${f.id}')" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-teal-600 touch-target">
                                                <i class="fa-solid fa-edit"></i>
                                            </button>
                                            <i class="fa-solid fa-folder text-3xl text-teal-500"></i>
                                        </div>
                                    </div>
                                </div>

                const results = searchWords(query);
                resultsDiv.innerHTML = results.length === 0 
                    ? `<div class="text-center py-6 text-slate-500 dark:text-slate-400">Ничего не найдено</div>`
                    : `<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl overflow-hidden">` + 
                      results.map(card => `

                            <div class="text-xs text-teal-600 dark:text-teal-400">${escapeHtml(card.folderName)}</div>

                      `).join('') + `</div>`;
            }

            renderResults(initialQuery);
            searchInput.addEventListener('input', e => renderResults(e.target.value));

        function selectFolder(folderId) {
            currentFolderId = folderId;
            document.getElementById('current-folder-name').textContent = getCurrentFolder().name;
            showFolderCards(folderId);
        }

        async function createFolder() {
            const name = prompt('Название новой колоды:');
            if (!name || !name.trim()) return;
            folders.push({ id: 'folder_' + Date.now(), name: name.trim(), cards: [] });
            await saveData();
            showFoldersView();
            await checkAchievements();
        }

        async function saveRenamedFolder(folderId, btn) {

        async function startStudy() {
            const folder = getCurrentFolder();
            dueCards = getDueCards(folder);
            initialDueCount = dueCards.length;

            if (dueCards.length > 0) {
                currentCardIndex = 0;
                showCurrentCard();

                const timeInfo = getTimeUntilNextReview(folder.cards);
                const container = document.getElementById('main-content');
                let html = `
                    <div class="scrollable-content flex items-center justify-center px-4">

                    html += `<p class="text-slate-600 dark:text-slate-400">Следующее повторение ${timeInfo.text} (около ${t})</p>`;
                }
                html += `
                            <button onclick="showFoldersView()" class="mt-4 px-6 py-3 bg-teal-600 text-white rounded-2xl font-medium text-base touch-target">Вернуться к колодам</button>

                    <div class="scrollable-content flex items-center justify-center px-4">

                            <p class="text-lg mb-3">В этой колоде пока нет слов</p>
                            <button onclick="showAddCardModal()" class="px-5 py-3 bg-teal-600 text-white rounded-2xl text-base touch-target">Добавить первое слово</button>
                        </div>
                    </div>
                `;
            }
        }

        // ========== ИСПРАВЛЕННАЯ showCurrentCard (одна кнопка озвучки) ==========
        function showCurrentCard() {
            if (currentCardIndex >= dueCards.length) {
                const container = document.getElementById('main-content');
                container.innerHTML = `
                    <div class="scrollable-content flex items-center justify-center px-4">
                        <div class="text-center py-6">
                            <i class="fa-solid fa-check-circle text-5xl text-emerald-500 mb-3"></i>
                            <p class="text-xl font-semibold">Отлично! Все карточки повторены.</p>
                            <button onclick="showFoldersView()" class="mt-4 px-6 py-3 bg-teal-600 text-white rounded-2xl font-medium text-base touch-target">Вернуться к колодам</button>
                        </div>
                    </div>
                `;
                return;
            }

            const card = dueCards[currentCardIndex];
            const hasImage = card.image && card.image.startsWith('data:image');

            let progressHtml = '';
            if (initialDueCount) {
                const done = currentCardIndex;
                const total = initialDueCount;
                const percent = Math.round((done / total) * 100);
                progressHtml = `
                    <div class="progress-area px-1 mb-1">
                        <div class="flex justify-between items-center mb-1">
                            <span>Выполнено <b>${done}</b> из <b>${total}</b></span>
                            <span class="text-teal-600 font-semibold">${percent}%</span>
                        </div>
                        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${percent}%"></div></div>
                    </div>
                `;
            }

            let imageHtml = hasImage 
                ? `<div class="image-area relative">
                     <img src="${card.image}" onclick="uploadImageForCurrentCard(event)" class="w-full max-h-36 object-contain rounded-2xl cursor-pointer">
                     <button onclick="event.stopImmediatePropagation(); removeImageFromCurrentCard()" class="absolute top-1 right-1 w-7 h-7 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg text-sm">✕</button>
                   </div>`
                : `<div onclick="uploadImageForCurrentCard(event)" class="image-placeholder">
                     <i class="fa-solid fa-camera text-lg"></i>
                     <span>Добавить фото</span>
                   </div>`;

            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="study-container">
                    ${progressHtml}
                    <div class="study-card-wrapper">
                        <div class="study-card card-enter" onclick="flipStudyCard()">
                            ${imageHtml}
                            <div id="card-front">
                                <div class="word-english">${escapeHtml(card.english)}</div>
                            </div>
                            <div id="card-back" class="hidden">
                                <div class="word-russian">${escapeHtml(card.russian)}</div>
                            </div>
                            <!-- ЕДИНАЯ КНОПКА ОЗВУЧКИ -->
                            <button onclick="event.stopImmediatePropagation(); speakCurrentWord()" class="speak-btn">
                                <i class="fa-solid fa-volume-up"></i>
                            </button>
                        </div>
                    </div>
                    <div class="rating-buttons">
                        <button onclick="rateCard(1)" class="rating-btn bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400">Снова<br><span class="text-xs opacity-70">Забыл</span></button>
                        <button onclick="rateCard(2)" class="rating-btn bg-orange-100 dark:bg-orange-900/40 text-orange-600 dark:text-orange-400">Трудно<br><span class="text-xs opacity-70">С усилием</span></button>
                        <button onclick="rateCard(3)" class="rating-btn bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400">Хорошо<br><span class="text-xs opacity-70">Нормально</span></button>
                        <button onclick="rateCard(4)" class="rating-btn bg-teal-600 text-white">Легко<br><span class="text-xs opacity-80">Сразу вспомнил</span></button>
                    </div>
                    <div class="text-center pb-1">
                        <button onclick="resetCurrentCard()" class="text-xs text-red-500 hover:text-red-600 flex items-center justify-center gap-x-1 mx-auto touch-target">

                        </button>
                    </div>

        // ========== НОВАЯ ФУНКЦИЯ speakCurrentWord ==========
        function speakCurrentWord() {
            const front = document.getElementById('card-front');
            const back = document.getElementById('card-back');
            if (!front || !back) return;
            if (!back.classList.contains('hidden')) {
                const russian = back.querySelector('.word-russian')?.textContent;
                if (russian) speakWord(russian);
            } else {
                const english = front.querySelector('.word-english')?.textContent;
                if (english) speakWord(english);
            }
        }

        // ========== ИСПРАВЛЕННАЯ viewCard (две отдельные кнопки) ==========
        function viewCard(cardId) {
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === cardId);
            if (!card) return;
            viewingCardId = cardId;

            const content = document.getElementById('card-view-content');
            content.innerHTML = `
                <div class="study-card" style="cursor:default; min-height:200px;">
                    <div class="flex items-center justify-center gap-x-3">
                        <div class="word-english">${escapeHtml(card.english)}</div>

                        </button>
                    </div>
                    <div class="flex items-center justify-center gap-x-3 mt-2">
                        <div class="word-russian">${escapeHtml(card.russian)}</div>
                        <button onclick="event.stopImmediatePropagation(); speakWord('${escJs(card.russian)}')" class="speak-btn" style="margin-top:0;">
                            <i class="fa-solid fa-volume-up"></i>
                        </button>
                    </div>
                    ${card.image ? `<img src="${card.image}" class="max-h-48 mx-auto rounded-2xl mt-4">` : ''}

        function flipStudyCard() {
            const front = document.getElementById('card-front');
            const back = document.getElementById('card-back');
            if (!front || !back) return;
            front.classList.toggle('hidden');
            back.classList.toggle('hidden');
            const cardEl = document.querySelector('.study-card');
            if (cardEl) {
                cardEl.classList.remove('flip-pulse');
                void cardEl.offsetWidth;
                cardEl.classList.add('flip-pulse');
            }
            recordFlip();
        }

        async function rateCard(grade) {
            const card = dueCards[currentCardIndex];
            await updateCardAfterReview(card, grade);
            await recordStudyActivity();
            await recordReviewOutcome(grade);

            const cardEl = document.querySelector('.study-card');
            const flashClasses = {
                1: 'ring-4 ring-red-400',
                2: 'ring-4 ring-orange-400',
                3: 'ring-4 ring-emerald-400',
                4: 'ring-4 ring-teal-400'
            };
            if (cardEl) {
                cardEl.classList.add(...flashClasses[grade].split(' '));
                cardEl.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
                await new Promise(r => setTimeout(r, 140));
                cardEl.style.opacity = '0';
                cardEl.style.transform = 'translateY(-10px)';
                await new Promise(r => setTimeout(r, 140));
            }

            currentCardIndex++;
            showCurrentCard();
            await checkAchievements();
        }

        async function resetCurrentCard() {
            if (!confirm('Сбросить прогресс этой карточки?')) return;
            const card = dueCards[currentCardIndex];
            if (!card) return;
            const folder = getCurrentFolder();
            const realCard = folder.cards.find(c => c.id === card.id);
            if (!realCard) return;
            resetCardProgress(realCard);
            Object.assign(card, realCard);
            await saveData();
            showCurrentCard();
        }

        // ==================== ПРОСМОТР КАРТОЧКИ (дополнительные функции) ====================
        function hideCardViewModal() {
            document.getElementById('cardViewModal').classList.add('hidden');
            document.getElementById('cardViewModal').classList.remove('flex');
        }

        function editFromViewModal() {
            hideCardViewModal();
            editCard(viewingCardId);
        }

        async function resetFromViewModal() {
            if (!confirm('Сбросить прогресс этой карточки?')) return;
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === viewingCardId);
            if (card) {
                resetCardProgress(card);
                await saveData();
            }
            hideCardViewModal();
            showFolderCards(currentFolderId);
        }

        // ==================== РЕДАКТИРОВАНИЕ ====================
        function editCard(cardId) {
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === cardId);
            if (!card) return;
            editingCardId = cardId;

            document.getElementById('edit-english').value = card.english;
            document.getElementById('edit-russian').value = card.russian;
            document.getElementById('edit-stability').value = card.stability !== undefined ? card.stability.toFixed(2) : '';
            document.getElementById('edit-difficulty').value = card.difficulty !== undefined ? card.difficulty.toFixed(2) : '';
            document.getElementById('edit-state').value = card.state || 'new';
            const d = new Date(card.nextReviewDate);
            document.getElementById('edit-next-date').value = d.toISOString().split('T')[0];

            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        }

        function hideEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
        }

        async function saveEditedCard() {
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === editingCardId);
            if (!card) return;
            card.english = document.getElementById('edit-english').value.trim();
            card.russian = document.getElementById('edit-russian').value.trim();
            const stabilityVal = document.getElementById('edit-stability').value;
            const difficultyVal = document.getElementById('edit-difficulty').value;
            card.stability = stabilityVal !== '' ? parseFloat(stabilityVal) : undefined;
            card.difficulty = difficultyVal !== '' ? clampDifficulty(parseFloat(difficultyVal)) : undefined;
            card.state = document.getElementById('edit-state').value;
            const dateVal = document.getElementById('edit-next-date').value;
            if (dateVal) card.nextReviewDate = new Date(dateVal).toISOString();
            await saveData();
            hideEditModal();
            showFolderCards(currentFolderId);
        }

        async function deleteCurrentCard() {
            if (!confirm('Удалить эту карточку?')) return;
            const folder = getCurrentFolder();
            folder.cards = folder.cards.filter(c => c.id !== editingCardId);
            await saveData();
            hideEditModal();
            showFolderCards(currentFolderId);
        }

        async function resetCardProgressFromModal() {
            if (!confirm('Сбросить прогресс этой карточки?')) return;
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === editingCardId);
            if (!card) return;
            resetCardProgress(card);
            await saveData();
            hideEditModal();
            showFolderCards(currentFolderId);
        }

        // ==================== ИЗОБРАЖЕНИЯ ====================
        async function uploadImageForCard(cardId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const folder = getCurrentFolder();
                const card = folder.cards.find(c => c.id === cardId);
                if (card) {
                    await compressAndSetImage(card, file);
                    showFolderCards(currentFolderId);
                }
            };
            input.click();
        }

        async function uploadImageForCurrentCard(e) {
            if (e) e.stopImmediatePropagation();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                const card = dueCards[currentCardIndex];
                await compressAndSetImage(card, file);
                showCurrentCard();
            };
            input.click();
        }

        async function removeImageFromCurrentCard() {
            if (!confirm('Удалить картинку?')) return;
            dueCards[currentCardIndex].image = null;
            await saveData();
            showCurrentCard();
        }

        // ==================== ДОБАВЛЕНИЕ / ИМПОРТ ====================
        function showAddCardModal() {
            document.getElementById('new-english').value = '';
            document.getElementById('new-russian').value = '';
            document.getElementById('addCardModal').classList.remove('hidden');
            document.getElementById('addCardModal').classList.add('flex');
        }

        function hideAddCardModal() {
            document.getElementById('addCardModal').classList.add('hidden');
            document.getElementById('addCardModal').classList.remove('flex');
        }

        async function addNewCard() {
            const english = document.getElementById('new-english').value.trim();
            const russian = document.getElementById('new-russian').value.trim();
            if (!english || !russian) return alert('Заполните оба поля');
            const folder = getCurrentFolder();
            folder.cards.push({
                id: 'card_' + Date.now(),
                english, russian,
                image: null,
                ...makeFreshCardProgress()
            });
            await saveData();
            hideAddCardModal();
            showFolderCards(currentFolderId);
        }

        async function importWords() {
            const text = document.getElementById('import-text').value.trim();
            const folderId = document.getElementById('import-folder-select').value;
            const folder = folders.find(f => f.id === folderId);
            if (!text || !folder) return;
            let count = 0;
            text.split('\n').forEach(line => {
                const parts = line.split(/[-–—:]/).map(p => p.trim());
                if (parts.length >= 2) {
                    folder.cards.push({
                        id: 'card_' + Date.now() + Math.random(),
                        english: parts[0],
                        russian: parts[1],
                        image: null,
                        ...makeFreshCardProgress()
                    });
                    count++;
                }
            });
            await saveData();
            document.getElementById('import-text').value = '';
            alert(`Импортировано ${count} слов`);
            showFolderCards(folderId);
            await checkAchievements();
        }

        function editCardFromSearch(folderId, cardId) {
            currentFolderId = folderId;
            editCard(cardId);
        }

        // ==================== ЭКСПОРТ ====================
        function exportAllData() {
            if (folders.length === 0) return alert('Нет данных для экспорта');
            const data = JSON.stringify(folders, null, 2);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], {type: 'application/json'}));
            a.download = `vocabulary_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        async function importFromFile() {
            const input = document.getElementById('import-file-input');
            const file = input.files[0];
            if (!file) return alert('Выберите файл');
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('Не массив');
                    if (imported.some(f => !f.id || !f.name || !Array.isArray(f.cards))) {
                        throw new Error('Неверный формат данных');
                    }
                    if (confirm('Заменить текущие данные или добавить колоды? (OK — заменить, Отмена — добавить)')) {
                        folders = imported;
                    } else {
                        folders = folders.concat(imported);
                    }
                    await saveData();
                    alert('Данные импортированы');
                    showFoldersView();
                    await checkAchievements();
                } catch (err) {
                    alert('Ошибка импорта: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        // ==================== СБРОС СТАТИСТИКИ И ДОСТИЖЕНИЙ ====================

            if (!confirm('Сбросить все достижения? Вы сможете получить их заново. Статистика занятий останется.')) return;
            stats.unlocked = {};
            await saveStats();
            if (document.getElementById('current-folder-name').textContent === 'Статистика') {
                showStatsView();
            } else {
                alert('Достижения сброшены');
            }
        }

        async function resetAllStats() {
            if (!confirm('Сбросить всю статистику и достижения? Будут удалены все данные об активности, сериях, днях занятий, достижениях. Прогресс карточек не будет затронут.')) return;
            stats = { studyDates: [], unlocked: {}, dailyStats: {}, consecutiveCorrect: 0, maxConsecutiveCorrect: 0, totalFlips: 0, totalImages: 0 };
            await saveStats();
            if (document.getElementById('current-folder-name').textContent === 'Статистика') {
                showStatsView();

                alert('Статистика и достижения сброшены');

        // ==================== СБРОС ПРОГРЕССА ====================
        function showResetFolderSelectionModal() {
            const modal = document.getElementById('resetFolderSelectionModal');
            if (!modal) return;

            if (listContainer) {
                listContainer.innerHTML = folders.map(f => `

                        <span>${escapeHtml(f.name)}</span>

            modal.classList.add('flex');

        function hideResetFolderSelectionModal() {
            const modal = document.getElementById('resetFolderSelectionModal');
            if (modal) {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        async function resetSelectedFolderProgress(folderId) {
            if (!confirm('Сбросить прогресс всех слов в этой колоде?')) return;
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            folder.cards.forEach(c => resetCardProgress(c));
            await saveData();
            alert(`Прогресс в колоде «${folder.name}» сброшен`);
            if (currentFolderId === folderId) {
                showFolderCards(folderId);
            } else {
                showFoldersView();
            }
        }

        async function resetAllProgress() {
            if (!confirm('Сбросить прогресс ВСЕХ слов во всех колодах?')) return;
            folders.forEach(folder => {
                folder.cards.forEach(c => resetCardProgress(c));
            });
            await saveData();
            alert('Прогресс всех колод сброшен');
            showFoldersView();
        }

        // ==================== УДАЛЕНИЕ КОЛОДЫ ====================
        function showDeleteFolderModal() {
            if (folders.length === 0) return;
            if (folders.length === 1) {
                if (confirm(`Удалить колоду «${folders[0].name}»?`)) performDeleteFolder(folders[0].id);
                return;
            }
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6">
                    <div class="font-semibold text-xl mb-4">Выберите колоду для удаления</div>
                    ${folders.map(f => `
                        <button onclick="confirmDeleteFolder('${f.id}'); this.closest('.fixed').remove()" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800 flex justify-between mb-1 text-base touch-target">

                    `).join('')}
                    <button onclick="this.closest('.fixed').remove()" class="mt-4 w-full py-3 rounded-2xl border border-slate-300 dark:border-slate-600 text-base touch-target">Отмена</button>
                </div>

        async function confirmDeleteFolder(folderId) {
            if (!confirm('Удалить эту колоду?')) return;
            await performDeleteFolder(folderId);
        }

        async function performDeleteFolder(folderId) {
            folders = folders.filter(f => f.id !== folderId);
            if (folders.length > 0) currentFolderId = folders[0].id;
            await saveData();
            showFoldersView();
        }

        // ==================== УЛУЧШЕННАЯ ОЗВУЧКА (Google TTS + SpeechSynthesis) ====================

        function detectLanguage(text) {
            if (/[а-яё]/i.test(text)) return 'ru';
            return 'en';
        }

        async function speakWord(text) {
            if (!text) return;

            const lang = detectLanguage(text);
            const langCode = lang === 'en' ? 'en-US' : 'ru-RU';

            try {
                const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${langCode}&client=tw-ob&q=${encodeURIComponent(text)}`;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36',
                        'Referer': 'https://translate.google.com/',
                    },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                if (response.ok) {
                    const blob = await response.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                    audio.onended = () => URL.revokeObjectURL(audioUrl);
                    return;
                } else {
                    throw new Error(`Google TTS ответил с ошибкой ${response.status}`);
                }
            } catch (error) {
                console.warn('Google TTS не сработал, переключаемся на speechSynthesis:', error.message);
                await fallbackSpeak(text, lang);
            }
        }

        async function fallbackSpeak(text, lang) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            const voices = await loadVoices();
            const langCode = lang === 'en' ? 'en-US' : 'ru-RU';

            let voice = null;
            if (voices.length > 0) {
                voice = voices.find(v => v.lang === langCode);
                if (!voice) voice = voices.find(v => v.lang.startsWith(lang));
                if (!voice) voice = voices.find(v => v.lang.includes(lang));
                if (!voice) voice = voices[0];
            }

            const utterance = new SpeechSynthesisUtterance(text);
            if (voice) utterance.voice = voice;
            utterance.lang = langCode;
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            window.speechSynthesis.speak(utterance);
        }

        let voicesLoaded = false;
        let voicesList = [];

        function loadVoices() {
            return new Promise((resolve) => {
                if (voicesLoaded && voicesList.length > 0) {
                    resolve(voicesList);
                    return;
                }
                if (!window.speechSynthesis) {
                    resolve([]);
                    return;
                }
                let voices = window.speechSynthesis.getVoices();
                if (voices && voices.length > 0) {
                    voicesList = voices;
                    voicesLoaded = true;
                    resolve(voicesList);
                    return;
                }
                const onVoicesChanged = () => {
                    voicesList = window.speechSynthesis.getVoices();
                    voicesLoaded = true;
                    resolve(voicesList);
                    window.speechSynthesis.removeEventListener('voiceschanged', onVoicesChanged);
                };
                window.speechSynthesis.addEventListener('voiceschanged', onVoicesChanged);

                setTimeout(() => {
                    if (!voicesLoaded) {
                        const v = window.speechSynthesis.getVoices();
                        if (v && v.length > 0) {
                            voicesList = v;
                            voicesLoaded = true;
                        }
                        resolve(voicesList);
                        window.speechSynthesis.removeEventListener('voiceschanged', onVoicesChanged);
                    }
                }, 1000);
            });
        }

        // ==================== PWA ====================
        function generateIcon(size, text = 'V') {
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#0d9488'); grad.addColorStop(1, '#0f766e');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = `bold ${size * 0.6}px system-ui, sans-serif`;
            ctx.fillText(text, size/2, size/2 + size*0.05);
            return canvas.toDataURL('image/png');
        }

        function createManifest() {
            const icon192 = generateIcon(192);
            const icon512 = generateIcon(512);
            const manifest = {
                name: 'Vocabulary',
                short_name: 'Vocab',
                description: 'Учи слова с интервальными повторениями',
                start_url: '.',
                display: 'standalone',
                background_color: '#0f172a',
                theme_color: '#0d9488',
                orientation: 'portrait',
                icons: [
                    { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any' },
                    { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any' },
                    { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'maskable' },
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            return URL.createObjectURL(blob);
        }

        function registerSW() {
            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'vocab-v2';
                    const urlsToCache = ['./', 'https://cdn.tailwindcss.com', 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css'];
                    self.addEventListener('install', event => { event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))); });
                    self.addEventListener('fetch', event => { event.respondWith(caches.match(event.request).then(response => response || fetch(event.request))); });
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl, { scope: './' }).catch(err => console.warn('SW error:', err));
            }
        }

        (function installPWA() {
            const manifestUrl = createManifest();
            const link = document.createElement('link');
            link.rel = 'manifest'; link.href = manifestUrl;
            document.head.appendChild(link);
            window.addEventListener('load', registerSW);
        })();

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await loadData();
            await loadStats();
            initTheme();
            document.getElementById('current-folder-name').textContent = 'Мои колоды';
            showFoldersView();
            await checkAchievements();
        }

        window.onload = init;
    </script>
