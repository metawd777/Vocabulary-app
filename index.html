<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Vocabulary">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>Vocabulary • Финальная версия</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            margin:0;
            padding:0;
            height:100%;
            overflow:hidden;
            font-family: Georgia, 'Times New Roman', serif;
        }
        body { background:#f1f5f9; color:#0f172a; display:flex; flex-direction:column; }
        .dark body { background:#0f172a; color:#f1f5f9; }
        ::-webkit-scrollbar { display:none; }
        .touch-target { min-height:48px; min-width:48px; }
        .header-top { padding-top: max(env(safe-area-inset-top,12px),12px); flex-shrink:0; z-index:10; }
        #main-content { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0 16px; padding-bottom:0; }
        .bottom-nav { flex-shrink:0; padding-bottom:env(safe-area-inset-bottom,0); background:white; border-top:1px solid #e2e8f0; }
        .dark .bottom-nav { background:#0f172a; border-top-color:#1e293b; }
        .theme-btn { width:44px; height:44px; display:flex; align-items:center; justify-content:center; border-radius:9999px; font-size:1.5rem; background:transparent; color:#64748b; transition:all 0.2s; border:none; cursor:pointer; }
        .dark .theme-btn { color:#94a3b8; }
        .theme-btn.active { background:#0d9488 !important; color:#fff !important; box-shadow:0 0 0 3px rgba(13,148,136,0.5); transform:scale(1.12); border:2px solid #14b8a6; }

        /* === КАРТОЧКИ КАК В ANKI: центрирование по умолчанию === */
        .card-text {
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 100%;
            padding: 0 4px;
            text-align: center;           /* ← центрирование по умолчанию (как в Anki) */
            width: 100%;
            font-family: Georgia, 'Times New Roman', serif;
        }
        /* Если текст длинный (более 3 строк) — автоматически выравниваем по левому краю */
        .card-text.text-long {
            text-align: left;
        }
        .card-text-sm { font-size: 1.2rem; }
        .card-text-md { font-size: 1.8rem; }
        .card-text-lg { font-size: 2.2rem; }
        @media (max-width: 480px) {
            .card-text-lg { font-size: 1.8rem; }
            .card-text-md { font-size: 1.5rem; }
            .card-text-sm { font-size: 1rem; }
        }

        .study-card {
            background: white; border-radius:24px; border:1px solid #e2e8f0;
            padding:20px 16px; min-height:200px; width:100%;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            max-width:100%; overflow:hidden;
        }
        .dark .study-card { background:#1e293b; border-color:#334155; }

        .rating-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding-top:12px; }
        .rating-btn { padding:12px 0; border-radius:16px; font-weight:500; font-size:1rem; text-align:center; border:none; cursor:pointer; }
        .progress-area { font-size:0.875rem; color:#64748b; }
        .dark .progress-area { color:#94a3b8; }
        .scrollable-content { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; }
        .modal-content { max-height:90vh; overflow-y:auto; }
        .folder-item, .card-item { -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
        .context-menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000; animation:fadeIn .2s; }
        .context-menu { background:white; border-radius:28px; padding:16px 0; min-width:260px; max-width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.3); animation:slideUp .25s; }
        .dark .context-menu { background:#1e293b; }
        .context-menu-item { display:flex; align-items:center; padding:14px 24px; width:100%; border:none; background:transparent; font-size:1rem; color:#0f172a; cursor:pointer; gap:14px; text-align:left; font-weight:500; -webkit-user-select:none; user-select:none; }
        .dark .context-menu-item { color:#f1f5f9; }
        .context-menu-item:active { background:#f1f5f9; }
        .dark .context-menu-item:active { background:#334155; }
        .context-menu-item.danger { color:#ef4444; }
        .context-menu-divider { height:1px; background:#e2e8f0; margin:4px 16px; }
        .dark .context-menu-divider { background:#334155; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes slideUp { from { transform:translateY(20px) scale(0.98); opacity:0; } to { transform:translateY(0) scale(1); opacity:1; } }
        .image-area { width:100%; max-width:200px; margin:0 auto 12px; position:relative; }
        .image-placeholder { width:100%; max-width:200px; height:70px; border:2px dashed #cbd5e1; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:14px; color:#94a3b8; gap:8px; cursor:pointer; margin:0 auto 12px; }
        .dark .image-placeholder { border-color:#475569; }
        .speak-btn { color:#0d9488; font-size:1.5rem; background:none; border:none; cursor:pointer; padding:8px; }
        .study-container { display:flex; flex-direction:column; height:100%; padding-top:4px; }
        .study-card-wrapper { flex:1; display:flex; flex-direction:column; justify-content:center; min-height:0; }
        #mastered-suggestion { animation:fadeInUp 0.3s ease-out; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        textarea.card-input {
            width:100%;
            padding:10px 12px;
            border-radius:12px;
            border:1px solid #cbd5e1;
            background:transparent;
            font-size:1rem;
            resize:vertical;
            min-height:60px;
            max-height:200px;
            font-family:Georgia, 'Times New Roman', serif;
            color:inherit;
        }
        .dark textarea.card-input {
            border-color:#475569;
            background:#1e293b;
            color:#f1f5f9;
        }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100">

    <!-- Шапка -->
    <div class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 header-top">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-teal-600 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-graduation-cap text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-semibold">Vocabulary</h1>
                    <div id="current-folder-name" class="text-xs text-teal-600 dark:text-teal-400 font-medium"></div>

                <button onclick="setTheme('dark')" id="btn-dark" class="theme-btn touch-target"><i class="fa-solid fa-moon"></i></button>
                <button onclick="setTheme('auto')" id="btn-auto" class="theme-btn touch-target"><i class="fa-solid fa-magic"></i></button>
            </div>

    </div>

    <div id="main-content" class="max-w-3xl mx-auto w-full"></div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav max-w-3xl mx-auto w-full">
        <div class="grid grid-cols-4 text-center py-1 text-xs">
            <button onclick="showFoldersView()" class="flex flex-col items-center py-1 text-slate-600 dark:text-slate-300 touch-target"><i class="fa-solid fa-folder text-xl mb-0.5"></i><span>Колоды</span></button>
            <button onclick="startStudy()" class="flex flex-col items-center py-1 text-slate-600 dark:text-slate-300 touch-target"><i class="fa-solid fa-graduation-cap text-xl mb-0.5"></i><span>Учить</span></button>

            <button onclick="showManagementMenu()" class="flex flex-col items-center py-1 text-slate-600 dark:text-slate-300 touch-target"><i class="fa-solid fa-ellipsis-v text-xl mb-0.5"></i><span>Действия</span></button>

            <div id="card-view-content" class="text-center"></div>

            <div class="flex gap-3 mt-4">

            <div class="font-semibold text-xl mb-4">Добавить слово</div>
            <div class="space-y-3">
                <div><label class="block text-sm mb-1">Передняя сторона</label>
                    <textarea id="new-english" class="card-input" rows="2" placeholder="Введите текст..."></textarea>
                </div>
                <div><label class="block text-sm mb-1">Обратная сторона</label>
                    <textarea id="new-russian" class="card-input" rows="2" placeholder="Введите перевод..."></textarea>

            <div class="flex gap-3 mt-4">
                <button onclick="hideAddCardModal()" class="flex-1 py-3 rounded-xl border border-slate-300 dark:border-slate-600 text-base touch-target">Отмена</button>
                <button onclick="addNewCard()" class="flex-1 py-3 rounded-xl bg-teal-600 text-white font-medium text-base touch-target">Добавить</button>

    <!-- Остальные модалки -->
    <div id="importModal" onclick="hideImportModal()" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6 modal-content">
            <div class="font-semibold text-xl mb-4">Импорт слов</div>
            <div class="mb-3"><label class="block text-sm mb-1">Колода</label><select id="import-folder-select" class="w-full px-3 py-2 rounded-xl border border-slate-300 dark:border-slate-600 dark:bg-slate-800 touch-target"></select></div>
            <textarea id="import-text" placeholder="beautiful - красивый&#10;hello - привет" class="w-full h-32 p-3 rounded-xl border dark:bg-slate-800 font-mono text-sm"></textarea>
            <div class="flex gap-3 mt-3">
                <button onclick="hideImportModal()" class="flex-1 py-3 rounded-xl border border-slate-300 dark:border-slate-600 text-base touch-target">Отмена</button>
                <button onclick="importWords()" class="flex-1 py-3 rounded-xl bg-teal-600 text-white font-medium text-base touch-target">Импорт</button>
            </div>
            <hr class="my-3 border-slate-200 dark:border-slate-700">
            <div class="font-semibold text-base mb-2">Импорт из файла</div>
            <input type="file" id="import-file-input" accept=".json" class="w-full text-sm touch-target">
            <button onclick="importFromFile()" class="w-full mt-2 py-3 rounded-xl bg-indigo-600 text-white font-medium text-base touch-target">Загрузить</button>
        </div>
    </div>

    <div id="managementModal" onclick="hideManagementMenu()" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="relative bg-white dark:bg-slate-800 w-full sm:w-[380px] rounded-t-3xl sm:rounded-3xl p-6 modal-content">
            <button onclick="hideManagementMenu()" aria-label="Закрыть" class="absolute top-4 right-4 w-9 h-9 flex items-center justify-center rounded-full text-slate-400 hover:text-slate-700 dark:hover:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-700 touch-target"><i class="fa-solid fa-xmark text-lg"></i></button>
            <div class="font-semibold text-xl mb-4 pr-8">Действия</div>
            <div class="space-y-2">
                <button onclick="createFolder(); hideManagementMenu()" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center gap-x-3 text-base touch-target"><i class="fa-solid fa-plus w-5 text-teal-600"></i> <span>Создать колоду</span></button>
                <button onclick="exportAllData(); hideManagementMenu()" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center gap-x-3 text-base touch-target"><i class="fa-solid fa-file-export w-5 text-teal-600"></i> <span>Экспорт всех данных</span></button>
                <button onclick="showResetFolderSelectionModal(); hideManagementMenu()" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center gap-x-3 text-base touch-target"><i class="fa-solid fa-undo w-5 text-amber-500"></i> <span>Сбросить прогресс выбранной колоды</span></button>
                <button onclick="resetAllProgress(); hideManagementMenu()" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center gap-x-3 text-base touch-target"><i class="fa-solid fa-xmark w-5 text-red-500"></i> <span>Сбросить прогресс всех колод</span></button>
                <button onclick="hideManagementMenu(); showDeleteFolderModal()" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center gap-x-3 text-red-600 text-base touch-target"><i class="fa-solid fa-trash w-5"></i> <span>Удалить колоду</span></button>
            </div>

    <div id="resetFolderSelectionModal" onclick="hideResetFolderSelectionModal()" class="hidden fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6 modal-content">
            <div class="font-semibold text-xl mb-4">Выберите колоду для сброса прогресса</div>
            <div class="space-y-2" id="reset-folder-list"></div>
            <button onclick="hideResetFolderSelectionModal()" class="mt-4 w-full py-3 rounded-2xl border border-slate-300 dark:border-slate-600 text-base touch-target">Отмена</button>
        </div>
    </div>

    <script>
        // ==================== localforage ====================
        localforage.config({ name: 'VocabularyDB', storeName: 'vocab_store' });

        let folders = [];
        let currentFolderId = 'default';
        let currentCardIndex = 0;
        let dueCards = [];
        let initialDueCount = 0;
        let editingCardId = null;
        let viewingCardId = null;

        // ==================== ХРАНЕНИЕ И МИГРАЦИЯ ====================
        async function loadData() {
            try {
                const stored = await localforage.getItem('folders');
                if (stored && Array.isArray(stored) && stored.length > 0) {
                    folders = stored;
                } else {
                    folders = [{ id: 'default', name: 'Основная колода', cards: [] }];
                    await localforage.setItem('folders', folders);
                }
                if (!folders.some(f => f.id === currentFolderId)) {
                    currentFolderId = folders[0].id;
                }
            } catch (e) {
                console.warn('Ошибка загрузки', e);
                folders = [{ id: 'default', name: 'Основная колода', cards: [] }];
            }
            migrateData();
        }

        function migrateData() {
            let changed = false;
            let mastered = folders.find(f => f.name === 'Изученные слова' && f.system !== true);
            if (mastered) {
                mastered.system = true;
                changed = true;
            } else if (!folders.some(f => f.system === true)) {
                const newMastered = {
                    id: 'mastered_' + Date.now(),
                    name: 'Изученные слова',
                    system: true,
                    cards: []
                };
                folders.push(newMastered);
                changed = true;
            }
            folders.forEach(folder => {
                if (folder.system === undefined) {
                    folder.system = false;
                    changed = true;
                }
                folder.cards.forEach(card => {
                    if (card.lastGrade === undefined) {
                        card.lastGrade = undefined;
                        changed = true;
                    }
                    if (card.masteredSuggestionDismissed === undefined) {
                        card.masteredSuggestionDismissed = false;
                        changed = true;
                    }
                });
            });
            if (changed) {
                saveData();
            }
        }

        async function saveData() {
            try {
                await localforage.setItem('folders', folders);
            } catch (e) {
                console.error('Ошибка сохранения:', e);
                alert('Не удалось сохранить данные. Возможно, закончилось место на устройстве.');
            }
        }

        function getCurrentFolder() {
            return folders.find(f => f.id === currentFolderId) || folders[0];
        }

        // ==================== FSRS-4.5 ====================
        const FSRS_W = [0.40255, 1.18385, 3.173, 15.69105, 7.1949, 0.5345, 1.4604, 0.0046, 1.54575, 0.1192, 1.01925, 1.9395, 0.11, 0.29605, 2.2698, 0.2315, 2.9898, 0.51655, 0.6621];
        const FSRS_FACTOR = 19 / 81;
        const FSRS_DECAY = -0.5;
        const REQUESTED_RETENTION = 0.9;
        const LEARNING_STEPS_MIN = [10, 60, 240];
        const RELEARN_STEPS_MIN = [10, 60];
        const MAX_INTERVAL_DAYS = 365;

        function clampDifficulty(d) { return Math.min(10, Math.max(1, d)); }
        function fsrsRetrievability(elapsedDays, stability) {
            if (!stability || stability <= 0) return 0;
            return Math.pow(1 + FSRS_FACTOR * (elapsedDays / stability), FSRS_DECAY);
        }
        function fsrsIntervalDays(stability) {
            return (stability / FSRS_FACTOR) * (Math.pow(REQUESTED_RETENTION, 1 / FSRS_DECAY) - 1);
        }
        function fsrsInitialStability(grade) { return FSRS_W[grade - 1]; }
        function fsrsInitialDifficulty(grade) {
            return clampDifficulty(FSRS_W[4] - Math.exp(FSRS_W[5] * (grade - 1)) + 1);
        }
        function fsrsNextDifficulty(d, grade) {
            const deltaD = -FSRS_W[6] * (grade - 3);
            const dPrime = d + deltaD * ((10 - d) / 9);
            const easyD0 = fsrsInitialDifficulty(4);
            return clampDifficulty(FSRS_W[7] * easyD0 + (1 - FSRS_W[7]) * dPrime);
        }
        function fsrsNextStabilityOnSuccess(d, s, r, grade) {
            const tD = 11 - d;
            const tS = Math.pow(s, -FSRS_W[9]);
            const tR = Math.exp(FSRS_W[10] * (1 - r)) - 1;
            const hardPenalty = grade === 2 ? FSRS_W[15] : 1;
            const easyBonus = grade === 4 ? FSRS_W[16] : 1;
            const c = Math.exp(FSRS_W[8]);
            const alpha = 1 + tD * tS * tR * hardPenalty * easyBonus * c;
            return s * alpha;
        }
        function fsrsNextStabilityOnFail(d, s, r) {
            const dF = Math.pow(d, -FSRS_W[12]);
            const sF = Math.pow(s + 1, FSRS_W[13]) - 1;
            const rF = Math.exp(FSRS_W[14] * (1 - r));
            const newS = dF * sF * rF * FSRS_W[11];
            return Math.min(newS, s);
        }
        function addMinutes(date, minutes) { return new Date(date.getTime() + minutes * 60000); }
        function addDays(date, days) { return new Date(date.getTime() + days * 86400000); }
        function fuzzDays(days) {
            const fuzz = 1 + (Math.random() * 0.1 - 0.05);
            return Math.max(1, days * fuzz);
        }

        async function updateCardAfterReview(card, grade) {
            const now = new Date();
            if (!card.state) card.state = 'new';
            if (typeof card.reps === 'undefined') card.reps = 0;
            if (typeof card.lapses === 'undefined') card.lapses = 0;
            card.reps++;

            let elapsedDays = 0;
            if (card.last_review) {
                elapsedDays = Math.max(0, (now - new Date(card.last_review)) / 86400000);
            }

            if (card.state === 'new' || card.state === 'learning') {
                const step = card.learningStep || 0;
                if (grade === 1) {
                    card.state = 'learning'; card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[0]).toISOString();
                } else if (grade === 2) {
                    card.state = 'learning'; card.learningStep = step;
                    card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[step] * 1.5).toISOString();
                } else if (grade === 3) {
                    const nextStep = step + 1;
                    if (nextStep >= LEARNING_STEPS_MIN.length) {
                        card.state = 'review';
                        card.stability = fsrsInitialStability(3);
                        card.difficulty = fsrsInitialDifficulty(3);
                        delete card.learningStep;
                        let interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                        interval = Math.min(interval, MAX_INTERVAL_DAYS);
                        card.nextReviewDate = addDays(now, interval).toISOString();
                    } else {
                        card.state = 'learning'; card.learningStep = nextStep;
                        card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[nextStep]).toISOString();
                    }
                } else {
                    card.state = 'review';
                    card.stability = fsrsInitialStability(4);
                    card.difficulty = fsrsInitialDifficulty(4);
                    delete card.learningStep;
                    let interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                    interval = Math.min(interval, MAX_INTERVAL_DAYS);
                    card.nextReviewDate = addDays(now, interval).toISOString();
                }
            } else if (card.state === 'relearning') {
                const step = card.learningStep || 0;
                if (grade === 1) {
                    card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[0]).toISOString();
                } else if (grade === 2) {
                    card.learningStep = step;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[step] * 1.5).toISOString();
                } else {
                    const nextStep = step + 1;
                    if (grade === 4 || nextStep >= RELEARN_STEPS_MIN.length) {
                        card.state = 'review';
                        delete card.learningStep;
                        let interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                        interval = Math.min(interval, MAX_INTERVAL_DAYS);
                        card.nextReviewDate = addDays(now, interval).toISOString();
                    } else {
                        card.learningStep = nextStep;
                        card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[nextStep]).toISOString();
                    }
                }
            } else {
                const r = fsrsRetrievability(elapsedDays, card.stability);
                if (grade === 1) {
                    card.lapses++;
                    const newStability = fsrsNextStabilityOnFail(card.difficulty, card.stability, r);
                    card.difficulty = fsrsNextDifficulty(card.difficulty, 1);
                    card.stability = newStability;
                    card.state = 'relearning';
                    card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[0]).toISOString();
                } else {
                    const newStability = fsrsNextStabilityOnSuccess(card.difficulty, card.stability, r, grade);
                    card.difficulty = fsrsNextDifficulty(card.difficulty, grade);
                    card.stability = newStability;
                    let interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                    interval = Math.min(interval, MAX_INTERVAL_DAYS);
                    card.nextReviewDate = addDays(now, interval).toISOString();
                }
            }
            card.last_review = now.toISOString();
            await saveData();
        }

        function getTimeUntilNextReview(cards) {
            if (!cards || cards.length === 0) return null;
            const now = new Date();
            let soonest = cards.reduce((min, c) => new Date(c.nextReviewDate) < new Date(min.nextReviewDate) ? c : min);
            const diffMs = new Date(soonest.nextReviewDate) - now;
            if (diffMs <= 0) return { text: "сейчас", date: new Date(soonest.nextReviewDate) };
            const minutes = Math.floor(diffMs / 60000);
            const hours = Math.floor(diffMs / 3600000);
            const days = Math.floor(diffMs / 86400000);
            let text = days > 0 ? `через ${days} ${days === 1 ? 'день' : days < 5 ? 'дня' : 'дней'}` :
                       hours > 0 ? `через ${hours} ${hours === 1 ? 'час' : hours < 5 ? 'часа' : 'часов'}` :
                       `через ${minutes} ${minutes === 1 ? 'минуту' : minutes < 5 ? 'минуты' : 'минут'}`;
            return { text, date: new Date(soonest.nextReviewDate) };
        }

        function compressImage(file, maxWidth = 600, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

            card.image = compressed;

        // ==================== TTS ====================
        function detectLanguage(text) {
            if (/[а-яё]/i.test(text)) return 'ru';
            return 'en';
        }

        let voicesLoaded = false;
        let voicesList = [];

        function loadVoices() {
            return new Promise((resolve) => {
                if (voicesLoaded) { resolve(voicesList); return; }
                if (!window.speechSynthesis) { resolve([]); return; }
                const voices = window.speechSynthesis.getVoices();
                if (voices.length > 0) {
                    voicesList = voices;
                    voicesLoaded = true;
                    resolve(voices);
                } else {
                    window.speechSynthesis.onvoiceschanged = () => {
                        voicesList = window.speechSynthesis.getVoices();
                        voicesLoaded = true;
                        resolve(voicesList);
                    };
                }
            });
        }

        async function speakWord(text) {
            if (!text) return;
            const lang = detectLanguage(text);
            const langCode = lang === 'en' ? 'en-US' : 'ru';
            const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${langCode}&client=tw-ob&q=${encodeURIComponent(text)}`;
            try {
                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36',
                        'Referer': 'https://translate.google.com/',
                    }
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                    audio.onended = () => URL.revokeObjectURL(audioUrl);
                    return;
                }
            } catch (e) {
                console.warn('Google TTS error, using fallback', e);
                await fallbackSpeak(text, lang);
            }
        }

        async function fallbackSpeak(text, lang) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const voices = await loadVoices();
            const langPrefix = lang === 'en' ? 'en' : 'ru';
            let preferredVoice = voices.find(v => v.lang.startsWith(langPrefix) && v.default === true);
            if (!preferredVoice) {
                preferredVoice = voices.find(v => v.lang.startsWith(langPrefix));
            }
            if (!preferredVoice && voices.length > 0) {
                preferredVoice = voices[0];
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang === 'en' ? 'en-US' : 'ru-RU';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            if (preferredVoice) utterance.voice = preferredVoice;
            window.speechSynthesis.speak(utterance);
        }

        if (window.speechSynthesis) { loadVoices(); }

        function setTheme(mode) {
            const html = document.documentElement;
            localStorage.setItem('themeMode', mode);
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            let isDark;
            if (mode === 'light') {
                isDark = false;
                html.classList.remove('dark');
                document.getElementById('btn-light')?.classList.add('active');
            } else if (mode === 'dark') {
                isDark = true;
                html.classList.add('dark');
                document.getElementById('btn-dark')?.classList.add('active');
            } else {
                document.getElementById('btn-auto')?.classList.add('active');
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                html.classList.toggle('dark', isDark);
            }
            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) metaTheme.setAttribute('content', isDark ? '#0f172a' : '#ffffff');
        }

                    isLongPressTriggered = false;

                    isLongPressTriggered = false;

            element.addEventListener('mouseleave', endPress);
            element.addEventListener('contextmenu', (e) => e.preventDefault());
        }

            if (!confirm('Удалить фото из этой карточки?')) return;

            await saveData();
            editCard(editingCardId);

        // ==================== ОСНОВНЫЕ ЭКРАНЫ ====================
        async function showFoldersView(initialQuery = '') {
            document.getElementById('current-folder-name').textContent = 'Мои колоды';
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="scrollable-content px-1 pt-2">

                        <h2 class="text-xl font-semibold">Мои колоды</h2>

                        </button>
                    </div>
                    <div class="mb-3">

                                        <div>
                                            <div class="font-semibold text-lg">${f.name}</div>

                                        <i class="fa-solid fa-folder text-3xl text-teal-500"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                    document.querySelectorAll('[id^="folder-"]').forEach(el => {

                    : `<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl overflow-hidden">` +

        function selectFolder(folderId) {
            currentFolderId = folderId;
            document.getElementById('current-folder-name').textContent = getCurrentFolder().name;
            showFolderCards(folderId);
        }

        async function createFolder() {
            const name = prompt('Название новой колоды:');
            if (!name || !name.trim()) return;
            folders.push({ id: 'folder_' + Date.now(), name: name.trim(), cards: [], system: false });
            await saveData();
            showFoldersView();
        }

        function showRenameFolderModal(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]';

                <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6">

        async function saveRenamedFolder(folderId, btn) {
            const modal = btn.closest('.fixed');
            const newName = modal.querySelector('#rename-input').value.trim();
            if (!newName) return alert('Название не может быть пустым');

            if (folder) folder.name = newName;
            if (currentFolderId === folderId) document.getElementById('current-folder-name').textContent = newName;
            await saveData();
            modal.remove();
            showFoldersView();

            document.getElementById('current-folder-name').textContent = folder.name;
            const container = document.getElementById('main-content');

        async function startStudy() {
            const folder = getCurrentFolder();
            dueCards = getDueCards(folder);
            initialDueCount = dueCards.length;

            if (dueCards.length > 0) {
                currentCardIndex = 0;
                showCurrentCard();
            } else if (folder.cards.length > 0) {
                const timeInfo = getTimeUntilNextReview(folder.cards);
                const container = document.getElementById('main-content');
                let html = `
                    <div class="scrollable-content flex items-center justify-center px-4">
                        <div class="text-center py-6">

                            <h2 class="text-xl font-semibold mb-2">Пока нет слов для повторения</h2>
                `;

                    const t = timeInfo.date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                    html += `<p class="text-slate-600 dark:text-slate-400">Следующее повторение ${timeInfo.text} (около ${t})</p>`;
                }
                html += `
                            <button onclick="showFoldersView()" class="mt-4 px-6 py-3 bg-teal-600 text-white rounded-2xl font-medium text-base touch-target">Вернуться к колодам</button>
                        </div>
                    </div>

                container.innerHTML = `
                    <div class="scrollable-content flex items-center justify-center px-4">
                        <div class="text-center py-6">
                            <p class="text-lg mb-3">В этой колоде пока нет слов</p>
                            <button onclick="showAddCardModal()" class="px-5 py-3 bg-teal-600 text-white rounded-2xl text-base touch-target">Добавить первое слово</button>
                        </div>
                    </div>
                `;
            }
        }

        // Функция для определения, является ли текст длинным (более 3 строк)
        function isTextLong(text) {
            if (!text) return false;
            // Считаем количество переносов строк
            const lines = text.split('\n').length;
            // Если больше 3 строк или текст содержит более 50 символов с пробелами
            return lines > 3 || text.length > 50;
        }

        function showCurrentCard() {
            if (currentCardIndex >= dueCards.length) {
                const container = document.getElementById('main-content');
                container.innerHTML = `
                    <div class="scrollable-content flex items-center justify-center px-4">
                        <div class="text-center py-6">
                            <i class="fa-solid fa-check-circle text-5xl text-emerald-500 mb-3"></i>
                            <p class="text-xl font-semibold">Отлично! Все карточки повторены.</p>
                            <button onclick="showFoldersView()" class="mt-4 px-6 py-3 bg-teal-600 text-white rounded-2xl font-medium text-base touch-target">Вернуться к колодам</button>
                        </div>
                    </div>
                `;
                return;
            }

            const card = dueCards[currentCardIndex];
            const hasImage = card.image && card.image.startsWith('data:image');

            const done = currentCardIndex;
            const total = initialDueCount;
            const percent = total > 0 ? Math.round((done / total) * 100) : 0;
            const progressHtml = `
                <div class="progress-area flex justify-between items-center px-1">
                    <span>Выполнено <b>${done}</b> из <b>${total}</b></span>
                    <span class="text-teal-600 font-semibold">${percent}%</span>
                </div>
            `;

            let imageHtml = hasImage 
                ? `<div class="image-area"><img src="${card.image}" onclick="uploadImageForCurrentCard(event)" class="w-full max-h-36 object-contain rounded-2xl cursor-pointer"><button onclick="event.stopImmediatePropagation(); removeImageFromCurrentCard()" class="absolute top-1 right-1 w-7 h-7 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg text-sm">✕</button></div>`
                : `<div onclick="uploadImageForCurrentCard(event)" class="image-placeholder"><i class="fa-solid fa-camera text-lg"></i> <span>Добавить фото</span></div>`;

            // Определяем, длинный ли текст
            const isEnglishLong = isTextLong(card.english);
            const isRussianLong = isTextLong(card.russian);
            const englishAlignClass = isEnglishLong ? 'text-long' : '';
            const russianAlignClass = isRussianLong ? 'text-long' : '';

            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="study-container">
                    ${progressHtml}
                    <div class="study-card-wrapper">
                        <div class="study-card" onclick="flipStudyCard()">
                            ${imageHtml}
                            <div id="card-front" class="card-text card-text-lg ${englishAlignClass}" style="white-space:pre-wrap;word-break:break-word;width:100%;">${card.english}</div>
                            <div id="card-back" class="card-text card-text-lg ${russianAlignClass}" style="white-space:pre-wrap;word-break:break-word;width:100%;display:none;">${card.russian}</div>
                            <div class="flex gap-4 mt-4">
                                <button onclick="event.stopImmediatePropagation(); speakWord('${card.english}')" class="speak-btn"><i class="fa-solid fa-volume-up"></i></button>
                                <button onclick="event.stopImmediatePropagation(); speakWord('${card.russian}')" class="speak-btn"><i class="fa-solid fa-volume-up"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="rating-buttons">
                        <button onclick="rateCard(1)" class="rating-btn bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400">Снова</button>
                        <button onclick="rateCard(2)" class="rating-btn bg-orange-100 dark:bg-orange-900/40 text-orange-600 dark:text-orange-400">Трудно</button>
                        <button onclick="rateCard(3)" class="rating-btn bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400">Хорошо</button>
                        <button onclick="rateCard(4)" class="rating-btn bg-teal-600 text-white">Легко</button>
                    </div>

                    <div class="flex justify-between items-center px-2 pb-2 mt-2">
                        <button onclick="markCurrentCardAsMastered()" class="text-xs text-emerald-600 flex items-center gap-x-1 touch-target">
                            <i class="fa-solid fa-trophy"></i> <span>В архив</span>
                        </button>
                        <button onclick="resetCurrentCard()" class="text-xs text-red-500 flex items-center gap-x-1 touch-target">
                            <i class="fa-solid fa-undo"></i> <span>Сбросить</span>
                        </button>
                    </div>
                </div>
            `;
        }

        function flipStudyCard() {
            const front = document.getElementById('card-front');
            const back = document.getElementById('card-back');
            if (!front || !back) return;
            front.style.display = (front.style.display === 'none' ? 'block' : 'none');
            back.style.display = (back.style.display === 'none' ? 'block' : 'none');
        }

        async function rateCard(grade) {
            const card = dueCards[currentCardIndex];
            if (!card) return;

            await updateCardAfterReview(card, grade);
            card.lastGrade = grade;

            if (grade >= 3 && shouldSuggestMastered(card)) {
                showMasteredSuggestion(card, currentCardIndex);
            } else {
                currentCardIndex++;
                showCurrentCard();
            }
        }

        async function resetCurrentCard() {
            if (!confirm('Сбросить прогресс этой карточки?')) return;
            const card = dueCards[currentCardIndex];
            if (!card) return;
            const folder = getCurrentFolder();
            const realCard = folder.cards.find(c => c.id === card.id);
            if (!realCard) return;
            resetCardProgress(realCard);
            Object.assign(card, realCard);
            await saveData();
            showCurrentCard();
        }

            document.getElementById('cardViewModal').classList.add('hidden');

        }

        function editFromViewModal() {
            hideCardViewModal();
            editCard(viewingCardId);

        async function resetFromViewModal() {
            if (!confirm('Сбросить прогресс этой карточки?')) return;
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === viewingCardId);
            if (card) {
                resetCardProgress(card);
                await saveData();
            }
            hideCardViewModal();
            showFolderCards(currentFolderId);
        }

        // ==================== РЕДАКТИРОВАНИЕ ====================
        function editCard(cardId) {
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === cardId);
            if (!card) return;
            editingCardId = cardId;

            document.getElementById('edit-english').value = card.english;
            document.getElementById('edit-russian').value = card.russian;

            const deletePhotoContainer = document.getElementById('delete-photo-container');
            if (card.image) {
                deletePhotoContainer.classList.remove('hidden');
            } else {
                deletePhotoContainer.classList.add('hidden');
            }

            const actionBtn = document.getElementById('mastered-action-btn');
            const isInMastered = folder.system === true;

            if (isInMastered) {
                actionBtn.innerHTML = `<i class="fa-solid fa-undo"></i> <span>Вернуть в колоду...</span>`;
                actionBtn.className = "mt-3 w-full py-3 rounded-xl border border-amber-200 text-amber-600 flex items-center justify-center gap-x-2 text-sm touch-target";
                actionBtn.onclick = () => returnCardFromMastered(editingCardId);
            } else {
                actionBtn.innerHTML = `<i class="fa-solid fa-trophy"></i> <span>Переместить в архив</span>`;
                actionBtn.className = "mt-3 w-full py-3 rounded-xl border border-emerald-200 text-emerald-600 flex items-center justify-center gap-x-2 text-sm touch-target";
                actionBtn.onclick = moveEditingCardToMastered;
            }

            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');

            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');

            const card = folder.cards.find(c => c.id === editingCardId);
            if (!card) return;
            card.english = document.getElementById('edit-english').value.trim();
            card.russian = document.getElementById('edit-russian').value.trim();
            await saveData();
            hideEditModal();
            showFolderCards(currentFolderId);

            if (!confirm('Удалить эту карточку?')) return;
            const folder = getCurrentFolder();
            folder.cards = folder.cards.filter(c => c.id !== editingCardId);
            await saveData();
            hideEditModal();
            showFolderCards(currentFolderId);
        }

        async function resetCardProgressFromModal() {
            if (!confirm('Сбросить прогресс этой карточки?')) return;
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === editingCardId);
            if (!card) return;
            resetCardProgress(card);
            await saveData();
            hideEditModal();
            showFolderCards(currentFolderId);
        }

        // ==================== ИЗОБРАЖЕНИЯ ====================
        async function uploadImageForCard(cardId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const folder = getCurrentFolder();
                const card = folder.cards.find(c => c.id === cardId);
                if (card) {
                    await compressAndSetImage(card, file);
                    showFolderCards(currentFolderId);
                }
            };
            input.click();
        }

        async function uploadImageForCurrentCard(e) {
            if (e) e.stopImmediatePropagation();
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (ev) => {
                const file = ev.target.files[0];
                if (!file) return;
                const card = dueCards[currentCardIndex];
                await compressAndSetImage(card, file);
                showCurrentCard();
            };
            input.click();
        }

        async function removeImageFromCurrentCard() {
            if (!confirm('Удалить картинку?')) return;
            dueCards[currentCardIndex].image = null;
            await saveData();
            showCurrentCard();
        }

        // ==================== ДОБАВЛЕНИЕ / ИМПОРТ / ЭКСПОРТ ====================
        function showAddCardModal() {
            document.getElementById('new-english').value = '';
            document.getElementById('new-russian').value = '';

            document.getElementById('addCardModal').classList.add('hidden');

        async function addNewCard() {
            const english = document.getElementById('new-english').value.trim();
            const russian = document.getElementById('new-russian').value.trim();
            if (!english || !russian) return alert('Заполните оба поля');

            const folder = getCurrentFolder();
            const exists = folder.cards.some(c =>
                c.english.toLowerCase() === english.toLowerCase() &&
                c.russian.toLowerCase() === russian.toLowerCase()
            );
            if (exists) {
                alert('Такая карточка уже есть в этой колоде');
                return;
            }

            folder.cards.push({
                id: 'card_' + Date.now(),
                english, russian,
                image: null,
                ...makeFreshCardProgress()
            });
            await saveData();
            hideAddCardModal();
            showFolderCards(currentFolderId);

            const select = document.getElementById('import-folder-select');

            modal.classList.add('flex');
        }

        function hideImportModal() {
            document.getElementById('importModal').classList.add('hidden');
            document.getElementById('importModal').classList.remove('flex');
        }

        async function importWords() {
            const text = document.getElementById('import-text').value.trim();
            const folderId = document.getElementById('import-folder-select').value;
            const folder = folders.find(f => f.id === folderId);
            if (!text || !folder) return;
            let count = 0;
            text.split('\n').forEach(line => {
                const parts = line.split(/[-–—:]/).map(p => p.trim());
                if (parts.length >= 2) {
                    const exists = folder.cards.some(c =>
                        c.english.toLowerCase() === parts[0].toLowerCase() &&
                        c.russian.toLowerCase() === parts[1].toLowerCase()
                    );
                    if (!exists) {
                        folder.cards.push({
                            id: 'card_' + Date.now() + Math.random(),
                            english: parts[0],
                            russian: parts[1],
                            image: null,
                            ...makeFreshCardProgress()
                        });
                        count++;
                    }
                }
            });
            await saveData();
            hideImportModal();
            alert(`Импортировано ${count} слов (дубликаты пропущены)`);
            showFolderCards(currentFolderId);
        }

        async function importFromFile() {
            const input = document.getElementById('import-file-input');
            const file = input.files[0];
            if (!file) return alert('Выберите файл');
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('Не массив');
                    if (imported.some(f => !f.id || !f.name || !Array.isArray(f.cards))) {
                        throw new Error('Неверный формат данных');
                    }
                    if (confirm('Заменить текущие данные или добавить колоды? (OK — заменить, Отмена — добавить)')) {
                        folders = imported;
                    } else {
                        const existingIds = new Set(folders.map(f => f.id));
                        imported.forEach(f => {
                            if (!existingIds.has(f.id)) {
                                folders.push(f);
                            }
                        });
                    }
                    migrateData();
                    await saveData();
                    alert('Данные импортированы');
                    hideImportModal();
                    showFoldersView();
                } catch (err) {
                    alert('Ошибка импорта: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function exportAllData() {
            if (folders.length === 0) return alert('Нет данных для экспорта');
            const data = JSON.stringify(folders, null, 2);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], {type: 'application/json'}));
            a.download = `vocabulary_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        // ==================== МЕНЮ ДЕЙСТВИЯ ====================
        function showManagementMenu() {
            document.getElementById('managementModal').classList.remove('hidden');
            document.getElementById('managementModal').classList.add('flex');
        }

        function hideManagementMenu() {
            document.getElementById('managementModal').classList.add('hidden');
            document.getElementById('managementModal').classList.remove('flex');
        }

        // ==================== СБРОС ПРОГРЕССА ====================
        function showResetFolderSelectionModal() {
            const modal = document.getElementById('resetFolderSelectionModal');
            if (!modal) return;
            const listContainer = document.getElementById('reset-folder-list');
            if (listContainer) {
                listContainer.innerHTML = folders.map(f => `
                    <button onclick="resetSelectedFolderProgress('${f.id}'); hideResetFolderSelectionModal()" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 flex justify-between items-center text-base touch-target">
                        <span>${f.name}</span>
                        <span class="text-xs text-slate-400">${f.cards.length} слов</span>
                    </button>
                `).join('');
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function hideResetFolderSelectionModal() {
            const modal = document.getElementById('resetFolderSelectionModal');
            if (modal) {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        async function resetSelectedFolderProgress(folderId) {
            if (!confirm('Сбросить прогресс всех слов в этой колоде?')) return;
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            folder.cards.forEach(c => resetCardProgress(c));
            await saveData();
            alert(`Прогресс в колоде «${folder.name}» сброшен`);
            if (currentFolderId === folderId) {
                showFolderCards(folderId);
            } else {
                showFoldersView();
            }
        }

        async function resetAllProgress() {
            if (!confirm('Сбросить прогресс ВСЕХ слов во всех колодах?')) return;
            folders.forEach(folder => {
                folder.cards.forEach(c => resetCardProgress(c));
            });
            await saveData();
            alert('Прогресс всех колод сброшен');
            showFoldersView();
        }

        // ==================== УДАЛЕНИЕ КОЛОДЫ ====================
        function showDeleteFolderModal() {
            if (folders.length === 0) return;
            if (folders.length === 1) {
                if (confirm(`Удалить колоду «${folders[0].name}»?`)) performDeleteFolder(folders[0].id);
                return;
            }
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[420px] rounded-t-3xl sm:rounded-3xl p-6">
                    <div class="font-semibold text-xl mb-4">Выберите колоду для удаления</div>
                    ${folders.map(f => `
                        <button onclick="confirmDeleteFolder('${f.id}'); this.closest('.fixed').remove()" class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800 flex justify-between mb-1 text-base touch-target">
                            <span>${f.name}</span>
                            <span class="text-xs text-slate-400">${f.cards.length} слов</span>
                        </button>
                    `).join('')}
                    <button onclick="this.closest('.fixed').remove()" class="mt-4 w-full py-3 rounded-2xl border border-slate-300 dark:border-slate-600 text-base touch-target">Отмена</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function confirmDeleteFolder(folderId) {
            if (!confirm('Удалить эту колоду?')) return;
            await performDeleteFolder(folderId);
        }

        async function performDeleteFolder(folderId) {
            folders = folders.filter(f => f.id !== folderId);
            if (folders.length > 0) currentFolderId = folders[0].id;
            await saveData();
            showFoldersView();
        }

        function editCardFromSearch(folderId, cardId) {
            currentFolderId = folderId;
            editCard(cardId);
        }

        // ==================== PWA ====================
        function generateIcon(size, text = 'V') {
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#0d9488'); grad.addColorStop(1, '#0f766e');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = `bold ${size * 0.6}px system-ui, sans-serif`;
            ctx.fillText(text, size/2, size/2 + size*0.05);
            return canvas.toDataURL('image/png');
        }

        function createManifest() {
            const icon192 = generateIcon(192);
            const icon512 = generateIcon(512);
            const manifest = {
                name: 'Vocabulary',
                short_name: 'Vocab',
                description: 'Учи слова с интервальными повторениями',
                start_url: '.',
                display: 'standalone',
                background_color: '#0f172a',
                theme_color: '#0d9488',
                orientation: 'portrait',
                icons: [
                    { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any' },
                    { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any' },
                    { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'maskable' },
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            return URL.createObjectURL(blob);
        }

        function registerSW() {
            if ('serviceWorker' in navigator) {
                const swCode = `
                    const CACHE_NAME = 'vocab-v2';
                    const urlsToCache = ['./', 'https://cdn.tailwindcss.com', 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css'];
                    self.addEventListener('install', event => { event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))); });
                    self.addEventListener('fetch', event => { event.respondWith(caches.match(event.request).then(response => response || fetch(event.request))); });
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl, { scope: './' }).catch(err => console.warn('SW error:', err));
            }
        }

        (function installPWA() {
            const manifestUrl = createManifest();
            const link = document.createElement('link');
            link.rel = 'manifest'; link.href = manifestUrl;
            document.head.appendChild(link);
            window.addEventListener('load', registerSW);
        })();

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await loadData();
            initTheme();
            document.getElementById('current-folder-name').textContent = 'Мои колоды';
            showFoldersView();
        }

        window.onload = init;
    </script>
</body>
</html>
