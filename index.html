        // ==================== УЛУЧШЕННАЯ ОЗВУЧКА ====================
        function detectLanguage(text) {
            if (/[а-яё]/i.test(text)) return 'ru';
            return 'en';
        }

        async function speakWord(text) {
            if (!text) return;

            const lang = detectLanguage(text);
            const langCode = lang === 'en' ? 'en-US' : 'ru-RU';
            const cacheKey = `${lang}:${text}`;

            // Проверяем кэш в памяти
            if (audioCache.has(cacheKey)) {
                const cachedUrl = audioCache.get(cacheKey);
                const audio = new Audio(cachedUrl);
                audio.play();
                return;
            }

            try {
                const url = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${langCode}&client=tw-ob&q=${encodeURIComponent(text)}`;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);

                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36',
                        'Referer': 'https://translate.google.com/',
                    },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                if (response.ok) {
                    const blob = await response.blob();
                    const audioUrl = URL.createObjectURL(blob);

                    // Сохраняем в кэш памяти
                    audioCache.set(cacheKey, audioUrl);

                    const audio = new Audio(audioUrl);
                    audio.play();
                    audio.onended = () => URL.revokeObjectURL(audioUrl);
                    return;
                } else {
                    throw new Error(`Google TTS ответил с ошибкой ${response.status}`);
                }
            } catch (error) {
                console.warn('Google TTS не сработал, переключаемся на speechSynthesis:', error.message);
                await fallbackSpeak(text, lang);
            }
        }

        async function fallbackSpeak(text, lang) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            const voices = await loadVoices();
            const langCode = lang === 'en' ? 'en-US' : 'ru-RU';

            let voice = null;
            if (voices.length > 0) {
                voice = voices.find(v => v.lang === langCode);
                if (!voice) voice = voices.find(v => v.lang.startsWith(lang));
                if (!voice) voice = voices.find(v => v.lang.includes(lang));
                if (!voice) voice = voices[0];
            }

            const utterance = new SpeechSynthesisUtterance(text);
            if (voice) utterance.voice = voice;
            utterance.lang = langCode;
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;
            window.speechSynthesis.speak(utterance);
        }

        let voicesLoaded = false;
        let voicesList = [];

        function loadVoices() {
            return new Promise((resolve) => {
                if (voicesLoaded && voicesList.length > 0) {
                    resolve(voicesList);
                    return;
                }
                if (!window.speechSynthesis) {
                    resolve([]);
                    return;
                }
                let voices = window.speechSynthesis.getVoices();
                if (voices && voices.length > 0) {
                    voicesList = voices;
                    voicesLoaded = true;
                    resolve(voicesList);
                    return;
                }
                const onVoicesChanged = () => {
                    voicesList = window.speechSynthesis.getVoices();
                    voicesLoaded = true;
                    resolve(voicesList);
                    window.speechSynthesis.removeEventListener('voiceschanged', onVoicesChanged);
                };
                window.speechSynthesis.addEventListener('voiceschanged', onVoicesChanged);

                setTimeout(() => {
                    if (!voicesLoaded) {
                        const v = window.speechSynthesis.getVoices();
                        if (v && v.length > 0) {
                            voicesList = v;
                            voicesLoaded = true;
                        }
                        resolve(voicesList);
                        window.speechSynthesis.removeEventListener('voiceschanged', onVoicesChanged);
                    }
                }, 1000);
            });
        }

        // ==================== PWA (манифест, Service Worker отключён) ====================
        function generateIcon(size, text = 'V') {
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#0d9488'); grad.addColorStop(1, '#0f766e');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
            ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = `bold ${size * 0.6}px system-ui, sans-serif`;
            ctx.fillText(text, size/2, size/2 + size*0.05);
            return canvas.toDataURL('image/png');
        }

        function createManifest() {
            const icon192 = generateIcon(192);
            const icon512 = generateIcon(512);
            const manifest = {
                name: 'Vocabulary',
                short_name: 'Vocab',
                description: 'Учи слова с интервальными повторениями',
                start_url: '.',
                display: 'standalone',
                background_color: '#0f172a',
                theme_color: '#0d9488',
                orientation: 'portrait',
                icons: [
                    { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any' },
                    { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any' },
                    { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'maskable' },
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            return URL.createObjectURL(blob);
        }

        (function installPWA() {
            const manifestUrl = createManifest();
            const link = document.createElement('link');
            link.rel = 'manifest'; link.href = manifestUrl;
            document.head.appendChild(link);
        })();

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await loadData();
            validateAndRepairData();
            await loadStats();
            loadLimitSettings();
            initTheme();

            await MediaStore.init();
            await migrateOldBase64Images();

            document.getElementById('current-folder-name').textContent = 'Мои колоды';
            showFoldersView();
            await checkAchievements();
        }

        // ==================== Защита от потери данных при закрытии вкладки ====================
        function flushPendingChanges() {
            try {
                if (typeof saveData === 'function') {
                    saveData();
                }
            } catch (e) {
                console.warn('Ошибка при принудительном сохранении:', e);
            }
        }

        window.addEventListener('beforeunload', flushPendingChanges);
        window.addEventListener('pagehide', flushPendingChanges);

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                flushPendingChanges();
            }
        });

        window.onload = init;
    </script>
</body>
