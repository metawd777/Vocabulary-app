    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        input, textarea { -webkit-user-select: text; user-select: text; -webkit-touch-callout: default; }
        html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family: system-ui, -apple-system, sans-serif; }
        body { background:#f1f5f9; color:#0f172a; display:flex; flex-direction:column; }
        .dark body { background:#0f172a; color:#f1f5f9; }
        ::-webkit-scrollbar { display:none; }
        .touch-target { min-height:48px; min-width:48px; }

        .header-top { padding-top: max(env(safe-area-inset-top,12px),12px); flex-shrink:0; z-index:10; color:#0f172a; }
        .dark .header-top { color:#f1f5f9; }
        #main-content { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:0 16px; padding-bottom:0; position:relative; }
        .bottom-nav { flex-shrink:0; padding-bottom:env(safe-area-inset-bottom,0); background:white; border-top:1px solid #e2e8f0; }
        .dark .bottom-nav { background:#0f172a; border-top-color:#1e293b; }
        .bottom-nav button { color:#475569; }
        .dark .bottom-nav button { color:#cbd5e1; }

        .theme-btn {
            width:44px; height:44px; display:flex; align-items:center; justify-content:center;
            border-radius:9999px; font-size:1.5rem; background:transparent; color:#64748b;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1); border:none; cursor:pointer;
        }
        .dark .theme-btn { color:#94a3b8; }
        .theme-btn.active {
            background-color: #0d9488 !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.5) !important;
            transform: scale(1.12);
            border: 2px solid #14b8a6;
        }
        .dark .theme-btn.active {
            background-color: #14b8a6 !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.6) !important;
            border: 2px solid #5eead4;
            transform: scale(1.12);
        }

        .study-card {
            background: white; border-radius: 24px; border: 1px solid #e2e8f0;
            padding: 20px 16px; min-height: 200px; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
            max-width: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }
        .dark .study-card { background:#1e293b; border-color:#334155; }

        .study-card .word-english,
        .study-card .word-russian {
            max-width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            text-align: center;
            padding: 0 4px;
            line-height: 1.3;
            width: 100%;
            white-space: pre-line;
        }
        .study-card .word-english { font-size: var(--word-font-english, 2.5rem); }
        .study-card .word-russian { font-size: var(--word-font-russian, 2rem); }

        @media (max-width: 480px) {
            .study-card { --word-font-english: 2rem; --word-font-russian: 1.6rem; }
        }

        .study-container { display: flex; flex-direction: column; height: 100%; padding-top: 4px; }
        .study-card-wrapper { flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .study-card .image-area { width: 100%; max-width: 200px; margin-bottom: 12px; position: relative; flex-shrink: 0; }
        .study-card .image-area img { width: 100%; max-height: var(--img-max-height, 140px); object-fit: contain; border-radius: 16px; }
        .study-card .image-placeholder {
            width: 100%; max-width: 200px; height: 70px; border: 2px dashed #cbd5e1; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; color: #94a3b8; gap: 8px; cursor: pointer; margin-bottom: 12px;
        }
        .dark .study-card .image-placeholder { border-color: #475569; }

        .study-card .speak-btn { color: #0d9488; font-size: 1.5rem; margin-top: 4px; background: none; border: none; cursor: pointer; }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .card-enter { animation: cardEnter 0.28s cubic-bezier(0.16,1,0.3,1); }

        @keyframes flipPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .flip-pulse { animation: flipPulse 0.22s ease; }

    <script>
        // --- localforage & storage ---
        localforage.config({ name: 'VocabularyDB', storeName: 'vocab_store' });

        let folders = [];
        let currentFolderId = 'default';
        let currentCardIndex = 0;
        let dueCards = [];
        let initialDueCount = 0;
        let editingCardId = null;
        let viewingCardId = null;
        let editContext = 'folder'; // 'folder' | 'study' — куда возвращаться после закрытия модалки редактирования
        let stats = { studyDates: [], unlocked: {}, dailyStats: {}, consecutiveCorrect: 0, maxConsecutiveCorrect: 0, totalFlips: 0, totalImages: 0 };
        let lastReviewedCard = null;
        let dailyLimitEnabled = false;
        let dailyLimitCount = 20;
        let sessionStableCandidates = [];

        // ==================== MEDIA STORE (Cache API для изображений) ====================
        const MediaStore = {
            cacheName: 'vocabulary-images-v1',

            async init() {
                if (!('caches' in window)) {
                    console.warn('Cache API не поддерживается в этом браузере');
                    return false;
                }
                return true;
            },

            async saveImage(cardId, blob) {
                try {
                    const cache = await caches.open(this.cacheName);
                    const response = new Response(blob, {
                        headers: { 'Content-Type': blob.type || 'image/jpeg' }
                    });
                    await cache.put(`img/${cardId}`, response);
                    return cardId;
                } catch (e) {
                    console.error('Ошибка сохранения изображения в кэш:', e);
                    return null;
                }
            },

            async getImage(cardId) {
                try {
                    const cache = await caches.open(this.cacheName);
                    const response = await cache.match(`img/${cardId}`);
                    if (!response) return null;

                    const blob = await response.blob();
                    return URL.createObjectURL(blob);
                } catch (e) {
                    console.error('Ошибка загрузки изображения из кэша:', e);
                    return null;
                }
            },

            async deleteImage(cardId) {
                try {
                    const cache = await caches.open(this.cacheName);
                    await cache.delete(`img/${cardId}`);
                } catch (e) {
                    console.error('Ошибка удаления изображения из кэша:', e);
                }
            }
        };

        // Простой кэш озвучки в памяти на сессию
        const audioCache = new Map(); // key = `${lang}:${text}`

        // ==================== Защита FSRS от некорректных значений ====================
        function safeNumber(value, defaultValue) {
            return (typeof value === 'number' && Number.isFinite(value)) ? value : defaultValue;
        }

        function safeStability(value) {
            const result = safeNumber(value, 0.1);
            return result > 0 ? result : 0.1;
        }

        function safeDifficulty(value) {
            const result = safeNumber(value, 5);
            return Math.min(10, Math.max(1, result));
        }

        // ==================== Вспомогательные функции для изображений ====================
        async function compressImageToBlob(file, maxWidth = 600, quality = 0.75) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function getCardImageSrc(card) {
            if (card.imageId) {
                const url = await MediaStore.getImage(card.imageId);
                if (url) return url;

                console.warn('Изображение не найдено в кэше, imageId:', card.imageId);
                return null;
            }
            if (card.image && card.image.startsWith('data:image')) {
                return card.image;
            }
            return null;
        }

        async function migrateOldBase64Images() {
            let migrated = 0;

            for (const folder of folders) {
                for (const card of folder.cards) {
                    if (card.image && card.image.startsWith('data:image') && !card.imageId) {
                        try {
                            const res = await fetch(card.image);
                            const blob = await res.blob();

                            const imageId = 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);
                            await MediaStore.saveImage(imageId, blob);

                            card.image = null;
                            card.imageId = imageId;
                            migrated++;
                        } catch (e) {
                            console.warn('Не удалось мигрировать изображение:', e);
                        }
                    }
                }
            }

            if (migrated > 0) {
                await debouncedSaveData();
                console.log(`Мигрировано ${migrated} изображений из base64 в Cache API`);
            }
        }

        // ==================== Валидация данных после загрузки (ИСПРАВЛЕНА) ====================
        function validateAndRepairData() {
            let changed = false;
            const now = new Date().toISOString();

            folders.forEach(folder => {
                if (!Array.isArray(folder.cards)) {
                    folder.cards = [];
                    changed = true;
                }

                folder.cards.forEach(card => {
                    let cardChanged = false;

                    // 1. Если nextReviewDate отсутствует или некорректна — ставим на сегодня
                    if (!card.nextReviewDate || isNaN(new Date(card.nextReviewDate).getTime())) {
                        card.nextReviewDate = now;
                        cardChanged = true;
                    }

                    // 2. Определяем, выглядит ли карточка как "новая"
                    const looksNew = (card.state === 'new') ||
                                     ((card.reps || 0) === 0) ||
                                     (card.stability === undefined || card.stability === null);

                    if (looksNew) {
                        // Принудительно делаем новой и due сегодня (как при текстовом импорте)
                        card.state = 'new';
                        card.reps = 0;
                        card.lapses = card.lapses || 0;
                        delete card.stability;
                        delete card.difficulty;
                        delete card.learningStep;
                        card.last_review = null;
                        card.nextReviewDate = now;
                        card.masteredSuggestionDismissed = false;
                        cardChanged = true;
                    } else {
                        // Для изученных — валидируем stability/difficulty
                        card.stability = safeStability(card.stability);
                        card.difficulty = safeDifficulty(card.difficulty);
                    }

                    if (!card.state) {
                        card.state = 'new';
                        cardChanged = true;
                    }

                    if (cardChanged) changed = true;
                });
            });

            if (changed) {
                console.log('Данные были автоматически исправлены после загрузки');
                saveData();
            }
        }

        // Debounce для частых сохранений
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                return new Promise((resolve) => {
                    const later = () => {
                        clearTimeout(timeout);
                        Promise.resolve(func(...args)).then(resolve);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                });
            };

        // ==================== MIGRATE (ИСПРАВЛЕНА) ====================
        function migrateData() {
            let changed = false;
            // Находим существующую ручную системную папку (если она есть)
            let mastered = folders.find(f => f.name === 'Изученные слова' && f.system !== true);
            if (mastered) {
                mastered.system = true;
                changed = true;
            }
            // НЕ создаём пустую папку «Изученные слова» автоматически.
            // Она появится только при первом перемещении слова (через getMasteredFolder).

            // Удаляем дублирующиеся системные папки (если вдруг их несколько)
            const systemFolders = folders.filter(f => f.system === true);
            if (systemFolders.length > 1) {
                const main = systemFolders[0];
                for (let i = 1; i < systemFolders.length; i++) {
                    const extra = systemFolders[i];
                    if (extra.cards?.length) {
                        main.cards.push(...extra.cards);
                    }
                    folders = folders.filter(f => f.id !== extra.id);
                }
                changed = true;
            }

            // Остальные миграции полей (lastGrade, masteredSuggestionDismissed)
            folders.forEach(folder => {
                folder.cards.forEach(card => {
                    if (card.lastGrade === undefined) {
                        card.lastGrade = undefined;
                        changed = true;
                    }
                    if (card.masteredSuggestionDismissed === undefined) {
                        card.masteredSuggestionDismissed = false;
                        changed = true;
                    }
                });
            });
            if (changed) saveData();
        }

        // --- FSRS-4.5 ---
        const FSRS_W = [0.40255, 1.18385, 3.173, 15.69105, 7.1949, 0.5345, 1.4604, 0.0046, 1.54575, 0.1192, 1.01925, 1.9395, 0.11, 0.29605, 2.2698, 0.2315, 2.9898, 0.51655, 0.6621];
        const FSRS_FACTOR = 19 / 81;
        const FSRS_DECAY = -0.5;
        const REQUESTED_RETENTION = 0.9;
        const LEARNING_STEPS_MIN = [10, 60, 240];
        const RELEARN_STEPS_MIN = [10, 60];

        function clampDifficulty(d) { return Math.min(10, Math.max(1, d)); }
        function fsrsRetrievability(elapsedDays, stability) {
            if (!stability || stability <= 0) return 0;
            return Math.pow(1 + FSRS_FACTOR * (elapsedDays / stability), FSRS_DECAY);
        }
        function fsrsIntervalDays(stability) {
            return (stability / FSRS_FACTOR) * (Math.pow(REQUESTED_RETENTION, 1 / FSRS_DECAY) - 1);
        }
        function fsrsInitialStability(grade) { return FSRS_W[grade - 1]; }
        function fsrsInitialDifficulty(grade) {
            return clampDifficulty(FSRS_W[4] - Math.exp(FSRS_W[5] * (grade - 1)) + 1);
        }
        function fsrsNextDifficulty(d, grade) {
            const deltaD = -FSRS_W[6] * (grade - 3);
            const dPrime = d + deltaD * ((10 - d) / 9);
            const easyD0 = fsrsInitialDifficulty(4);
            return clampDifficulty(FSRS_W[7] * easyD0 + (1 - FSRS_W[7]) * dPrime);
        }
        function fsrsNextStabilityOnSuccess(d, s, r, grade) {
            const tD = 11 - d;
            const tS = Math.pow(s, -FSRS_W[9]);
            const tR = Math.exp(FSRS_W[10] * (1 - r)) - 1;
            const hardPenalty = grade === 2 ? FSRS_W[15] : 1;
            const easyBonus = grade === 4 ? FSRS_W[16] : 1;
            const c = Math.exp(FSRS_W[8]);
            const alpha = 1 + tD * tS * tR * hardPenalty * easyBonus * c;
            return s * alpha;
        }
        function fsrsNextStabilityOnFail(d, s, r) {
            const dF = Math.pow(d, -FSRS_W[12]);
            const sF = Math.pow(s + 1, FSRS_W[13]) - 1;
            const rF = Math.exp(FSRS_W[14] * (1 - r));
            const newS = dF * sF * rF * FSRS_W[11];
            return Math.min(newS, s);
        }
        function addMinutes(date, minutes) { return new Date(date.getTime() + minutes * 60000); }
        function addDays(date, days) { return new Date(date.getTime() + days * 86400000); }
        function fuzzDays(days) {
            const fuzz = 1 + (Math.random() * 0.1 - 0.05);
            return Math.max(1, days * fuzz);
        }

        async function updateCardAfterReview(card, grade) {
            const now = new Date();
            if (!card.state) card.state = 'new';
            if (typeof card.reps === 'undefined') card.reps = 0;
            if (typeof card.lapses === 'undefined') card.lapses = 0;
            card.reps++;

            let elapsedDays = 0;
            if (card.last_review) {
                elapsedDays = Math.max(0, (now - new Date(card.last_review)) / 86400000);
            }

            if (card.state === 'new' || card.state === 'learning') {
                const step = card.learningStep || 0;
                if (grade === 1) {
                    card.state = 'learning'; card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[0]).toISOString();
                } else if (grade === 2) {
                    card.state = 'learning'; card.learningStep = step;
                    card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[step] * 1.5).toISOString();
                } else if (grade === 3) {
                    const nextStep = step + 1;
                    if (nextStep >= LEARNING_STEPS_MIN.length) {
                        card.state = 'review';
                        card.stability = safeStability(fsrsInitialStability(3));
                        card.difficulty = safeDifficulty(fsrsInitialDifficulty(3));
                        delete card.learningStep;
                        const interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                        card.nextReviewDate = addDays(now, interval).toISOString();
                    } else {
                        card.state = 'learning'; card.learningStep = nextStep;
                        card.nextReviewDate = addMinutes(now, LEARNING_STEPS_MIN[nextStep]).toISOString();
                    }
                } else {
                    card.state = 'review';
                    card.stability = safeStability(fsrsInitialStability(4));
                    card.difficulty = safeDifficulty(fsrsInitialDifficulty(4));
                    delete card.learningStep;
                    const interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                    card.nextReviewDate = addDays(now, interval).toISOString();
                }
            } else if (card.state === 'relearning') {
                const step = card.learningStep || 0;
                if (grade === 1) {
                    card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[0]).toISOString();
                } else if (grade === 2) {
                    card.learningStep = step;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[step] * 1.5).toISOString();
                } else {
                    const nextStep = step + 1;
                    if (grade === 4 || nextStep >= RELEARN_STEPS_MIN.length) {
                        card.state = 'review';
                        delete card.learningStep;
                        const interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                        card.nextReviewDate = addDays(now, interval).toISOString();
                    } else {
                        card.learningStep = nextStep;
                        card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[nextStep]).toISOString();
                    }
                }
            } else {
                const r = fsrsRetrievability(elapsedDays, card.stability);
                if (grade === 1) {
                    card.lapses++;
                    const newStability = fsrsNextStabilityOnFail(card.difficulty, card.stability, r);
                    card.difficulty = safeDifficulty(fsrsNextDifficulty(card.difficulty, 1));
                    card.stability = safeStability(newStability);
                    card.state = 'relearning';
                    card.learningStep = 0;
                    card.nextReviewDate = addMinutes(now, RELEARN_STEPS_MIN[0]).toISOString();
                } else {
                    const newStability = fsrsNextStabilityOnSuccess(card.difficulty, card.stability, r, grade);
                    card.difficulty = safeDifficulty(fsrsNextDifficulty(card.difficulty, grade));
                    card.stability = safeStability(newStability);
                    const interval = Math.max(1, fuzzDays(fsrsIntervalDays(card.stability)));
                    card.nextReviewDate = addDays(now, interval).toISOString();
                }
            }
            card.last_review = now.toISOString();
            await saveData();
        }

        // ==================== ПОЛУЧЕНИЕ DUE-КАРТОЧЕК (ИСПРАВЛЕНА) ====================
        function getDueCards(folder) {
            const now = new Date();
            return folder.cards
                .filter(card => {
                    if (!card.nextReviewDate) return true;
                    const d = new Date(card.nextReviewDate);
                    return isNaN(d.getTime()) || d <= now;
                })
                .sort((a, b) => {
                    const da = new Date(a.nextReviewDate || 0);
                    const db = new Date(b.nextReviewDate || 0);
                    return da - db;
                });
        }

        function getDueCardsFromArray(cards) {
            const now = new Date();
            return cards
                .filter(card => {
                    if (!card.nextReviewDate) return true;
                    const d = new Date(card.nextReviewDate);
                    return isNaN(d.getTime()) || d <= now;
                })
                .sort((a, b) => {
                    const da = new Date(a.nextReviewDate || 0);
                    const db = new Date(b.nextReviewDate || 0);
                    return da - db;
                });
        }

        function getTimeUntilNextReview(cards) {
            if (!cards || cards.length === 0) return null;
            const now = new Date();
            let soonest = cards.reduce((min, c) => new Date(c.nextReviewDate) < new Date(min.nextReviewDate) ? c : min);
            const diffMs = new Date(soonest.nextReviewDate) - now;
            if (diffMs <= 0) return { text: "сейчас", date: new Date(soonest.nextReviewDate) };
            const minutes = Math.floor(diffMs / 60000);
            const hours = Math.floor(diffMs / 3600000);
            const days = Math.floor(diffMs / 86400000);
            let text = days > 0 ? `через ${days} ${days === 1 ? 'день' : days < 5 ? 'дня' : 'дней'}` :
                       hours > 0 ? `через ${hours} ${hours === 1 ? 'час' : hours < 5 ? 'часа' : 'часов'}` :
                       `через ${minutes} ${minutes === 1 ? 'минуту' : minutes < 5 ? 'минуты' : 'минут'}`;
            return { text, date: new Date(soonest.nextReviewDate) };
        }

        // --- Статистика и достижения ---
        function localDateKey(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        async function recordStudyActivity() {
            const key = localDateKey(new Date());
            if (!stats.studyDates.includes(key)) {
                stats.studyDates.push(key);
                await saveStats();
            }
        }

        function currentStreak() {
            if (!stats.studyDates || stats.studyDates.length === 0) return 0;
            const daySet = new Set(stats.studyDates);
            let streak = 0;
            let cursor = new Date();
            if (!daySet.has(localDateKey(cursor))) {
                cursor = addDays(cursor, -1);
            }
            while (daySet.has(localDateKey(cursor))) {
                streak++;
                cursor = addDays(cursor, -1);
            }
            return streak;
        }

        function getTodayStats() {
            const key = localDateKey(new Date());
            return stats.dailyStats?.[key] || null;
        }

        async function recordReviewOutcome(grade) {
            const key = localDateKey(new Date());
            if (!stats.dailyStats) stats.dailyStats = {};
            if (!stats.dailyStats[key]) {
                stats.dailyStats[key] = { total: 0, correct: 0, grades: [], usedAllGrades: false };
            }
            const today = stats.dailyStats[key];
            today.total++;
            if (grade >= 3) {
                today.correct++;
                stats.consecutiveCorrect++;
                if (stats.consecutiveCorrect > stats.maxConsecutiveCorrect) {
                    stats.maxConsecutiveCorrect = stats.consecutiveCorrect;
                }
            } else {
                stats.consecutiveCorrect = 0;
            }
            if (!today.grades.includes(grade)) {
                today.grades.push(grade);
                if (today.grades.length === 4) today.usedAllGrades = true;
            }
            await saveStats();
        }

        function computeGlobalStats() {
            let total = 0, statNew = 0, statLearning = 0, statReview = 0, statRelearning = 0;
            let totalReps = 0, totalLapses = 0, stabilitySum = 0, stabilityCount = 0;
            let totalImages = stats.totalImages || 0;
            let totalFlips = stats.totalFlips || 0;
            let maxConsecutiveCorrect = stats.maxConsecutiveCorrect || 0;

            folders.forEach(f => f.cards.forEach(c => {
                total++;
                if (c.state === 'learning') statLearning++;
                else if (c.state === 'review') statReview++;
                else if (c.state === 'relearning') statRelearning++;
                else statNew++;
                totalReps += c.reps || 0;
                totalLapses += c.lapses || 0;
                if (typeof c.stability === 'number') { stabilitySum += c.stability; stabilityCount++; }
            }));
            const percentCorrect = totalReps > 0 ? Math.max(0, Math.round((1 - totalLapses / totalReps) * 100)) : null;
            const avgStability = stabilityCount > 0 ? (stabilitySum / stabilityCount) : null;
            const learnedCount = statReview + statRelearning;
            const todayStats = getTodayStats();

            return { total, statNew, statLearning, statReview, statRelearning, totalReps, totalLapses, percentCorrect, avgStability, learnedCount, totalImages, totalFlips, maxConsecutiveCorrect, todayStats };
        }

                const cardIndex = currentFolder.cards.findIndex(c => c.id === id);
                if (cardIndex === -1) continue;

                if (masteredFolder.cards.some(c => c.id === id)) continue;

                currentFolder.cards.splice(cardIndex, 1);
                masteredFolder.cards.push(card);

            dueCards = dueCards.filter(c => !ids.includes(c.id));

        // ==================== СЖАТИЕ ИЗОБРАЖЕНИЙ ====================
        function compressImage(file, maxWidth = 600, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function compressAndSetImage(card, file) {
            const blob = await compressImageToBlob(file);
            if (!blob) return;

            const imageId = 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);

            const savedId = await MediaStore.saveImage(imageId, blob);
            if (!savedId) {
                alert('Не удалось сохранить изображение');
                return;
            }

            card.image = null;
            card.imageId = imageId;

            await debouncedSaveData();
            await recordPhotoAdded();
            await checkAchievements();
        }

        // ==================== ТЕМА ====================
        function setTheme(mode) {
            const html = document.documentElement;
            localStorage.setItem('themeMode', mode);

            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));

            let isDark;
            if (mode === 'light') {
                isDark = false;
                html.classList.remove('dark');
                document.getElementById('btn-light')?.classList.add('active');
            } else if (mode === 'dark') {
                isDark = true;
                html.classList.add('dark');
                document.getElementById('btn-dark')?.classList.add('active');
            } else {
                document.getElementById('btn-auto')?.classList.add('active');
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                html.classList.toggle('dark', isDark);
            }

            const metaTheme = document.querySelector('meta[name="theme-color"]');
            if (metaTheme) metaTheme.setAttribute('content', isDark ? '#0f172a' : '#ffffff');
        }

        function initTheme() {
            const saved = localStorage.getItem('themeMode') || 'auto';
            setTheme(saved);

            const media = window.matchMedia('(prefers-color-scheme: dark)');
            media.addEventListener('change', () => {
                if (localStorage.getItem('themeMode') === 'auto') {
                    setTheme('auto');
                }
            });
        }

                folder.cards.forEach(card => {
                    if (card.english.toLowerCase().includes(q) || card.russian.toLowerCase().includes(q)) {
                        results.push({ ...card, folderName: folder.name, folderId: folder.id });
                    }
                });
            });
            return results;

                                    <div class="text-sm text-slate-500 dark:text-slate-400">${f.cards ? f.cards.length : 0} слов${isHidden ? ' · <span class="text-amber-500">скрыто</span>' : ''}</div>
                                </div>
                                <div class="flex items-center gap-x-3">
                                    ${!isSystem ? `
                                    <button onclick="event.stopImmediatePropagation(); toggleFolderHidden('${f.id}', event)" 
                                            class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 text-xl touch-target">
                                        <i class="fa-solid ${isHidden ? 'fa-eye-slash' : 'fa-eye'}"></i>
                                    </button>` : ''}
                                    <i class="fa-solid ${isSystem ? 'fa-trophy text-amber-500' : 'fa-folder text-teal-500'} text-3xl"></i>
                                </div>
                            </div>
                        `;

                        if (studyMode === 'selected' && !isSystem) {
                            cardHtml += `</div></div>`;
                        }

                        cardHtml += `</div>`;
                        html += cardHtml;
                    }

                    html += `</div>`;
                    resultsDiv.innerHTML = html;

                    // Долгое нажатие для контекстного меню
                    document.querySelectorAll('[id^="folder-"]').forEach(el => {
                        const folderId = el.id.replace('folder-', '');
                        let pressTimer = null;

                        el.addEventListener('touchstart', (e) => {
                            el.style.transition = 'transform 0.08s ease';
                            el.style.transform = 'scale(0.985)';
                            pressTimer = setTimeout(() => {
                                if (navigator.vibrate) navigator.vibrate(20);
                                showFolderContextMenu(folderId);
                            }, 520);
                        }, { passive: true });

                        el.addEventListener('touchend', () => {
                            clearTimeout(pressTimer);
                            el.style.transform = 'scale(1)';
                        });
                        el.addEventListener('touchcancel', () => {
                            clearTimeout(pressTimer);
                            el.style.transform = 'scale(1)';
                        });
                        el.addEventListener('touchmove', () => {
                            clearTimeout(pressTimer);
                            el.style.transform = 'scale(1)';
                        });
                        el.addEventListener('contextmenu', (e) => {
                            e.preventDefault();
                            showFolderContextMenu(folderId);
                        });
                    });
                    return;
                }
                const results = searchWords(query);
                resultsDiv.innerHTML = results.length === 0 
                    ? `<div class="text-center py-6 text-slate-500 dark:text-slate-400">Ничего не найдено</div>`
                    : `<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl overflow-hidden">` + 
                      results.map(card => `
                        <div onclick="editCardFromSearch('${card.folderId}', '${card.id}')" class="flex justify-between items-center px-4 py-3 border-b border-slate-100 dark:border-slate-800 last:border-b-0 cursor-pointer touch-target">
                            <div><span class="font-medium">${escapeHtml(card.english)}</span> <span class="mx-2 text-slate-400">—</span> <span class="text-slate-600 dark:text-slate-300">${escapeHtml(card.russian)}</span></div>
                            <div class="text-xs text-teal-600 dark:text-teal-400">${escapeHtml(card.folderName)}</div>
                        </div>
                      `).join('') + `</div>`;
            }

            renderResults(initialQuery);
            searchInput.addEventListener('input', e => renderResults(e.target.value));
        }

        function selectFolder(folderId) {
            currentFolderId = folderId;
            document.getElementById('current-folder-name').textContent = getCurrentFolder().name;
            showFolderCards(folderId);
        }

        async function createFolder() {
            const name = prompt('Название новой колоды:');
            if (!name || !name.trim()) return;
            folders.push({ id: 'folder_' + Date.now(), name: name.trim(), cards: [], system: false });
            await saveData();
            showFoldersView();
            await checkAchievements();
        }

        // Скрыть/показать колоду. Скрытая колода: не пропадает и не удаляется,
        // просто уходит вниз списка, помечается значком и недоступна для изучения,
        // пока её не включат обратно. Прогресс и статистика по её словам не затрагиваются.
        async function toggleFolderHidden(folderId, event) {
            if (event) event.stopPropagation();
            const folder = folders.find(f => f.id === folderId);
            if (!folder || folder.system) return;
            folder.hidden = !folder.hidden;
            if (navigator.vibrate) navigator.vibrate(10);
            await saveData();
            const currentQuery = document.getElementById('search-input')?.value || '';
            showFoldersView(currentQuery);
        }

        async function unhideAndStudy(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (folder) folder.hidden = false;
            await saveData();
            startStudy();
        }

        // ==================== КОНТЕКСТНОЕ МЕНЮ ДЛЯ КОЛОД ====================
        function showFolderContextMenu(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder) return;
            const overlay = document.createElement('div');
            overlay.className = 'context-menu-overlay';
            overlay.onclick = function(e) { if (e.target === this) this.remove(); };
            const menu = document.createElement('div');
            menu.className = 'context-menu';
            menu.onclick = (e) => e.stopPropagation();
            menu.innerHTML = `
                <button class="context-menu-item" data-action="rename"><i class="fa-solid fa-pen"></i> Переименовать</button>
                <button class="context-menu-item" data-action="reset"><i class="fa-solid fa-rotate-left"></i> Сбросить прогресс</button>
                ${folder.system ? '' : `
                <button class="context-menu-item" data-action="toggle-hidden"><i class="fa-solid ${folder.hidden ? 'fa-eye' : 'fa-eye-slash'}"></i> ${folder.hidden ? 'Показать колоду' : 'Скрыть колоду'}</button>
                <div class="context-menu-divider"></div>
                <button class="context-menu-item danger" data-action="delete"><i class="fa-solid fa-trash"></i> Удалить колоду</button>
                `}
            `;
            overlay.appendChild(menu);
            document.body.appendChild(overlay);
            menu.querySelector('[data-action="rename"]').addEventListener('click', () => {
                overlay.remove();
                showRenameFolderModal(folderId);
            });
            menu.querySelector('[data-action="reset"]').addEventListener('click', () => {
                overlay.remove();
                resetSelectedFolderProgress(folderId);
            });
            const toggleHiddenBtn = menu.querySelector('[data-action="toggle-hidden"]');
            if (toggleHiddenBtn) {
                toggleHiddenBtn.addEventListener('click', () => {
                    overlay.remove();
                    toggleFolderHidden(folderId);
                });
            }
            const deleteBtn = menu.querySelector('[data-action="delete"]');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => {
                    overlay.remove();
                    if (confirm(`Удалить колоду «${folder.name}»?`)) {
                        performDeleteFolder(folderId);
                        showFoldersView();
                    }
                });
            }
        }

        function showRenameFolderModal(folderId) {
            const folder = folders.find(f => f.id === folderId);
            if (!folder || folder.system) return;
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-[100]';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div onclick="event.stopImmediatePropagation()" class="modal-panel-sm">
                    <div class="font-semibold text-xl mb-4">Переименовать колоду</div>
                    <div class="mb-4">
                        <label class="block text-sm mb-1">Новое название</label>
                        <input type="text" id="rename-input" value="${escapeHtml(folder.name)}" class="w-full px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 text-base touch-target">
                    </div>
                    <div class="flex gap-3">
                        <button onclick="this.closest('.fixed').remove()" class="btn-secondary-half">Отмена</button>
                        <button onclick="saveRenamedFolder('${folderId}', this)" class="btn-primary-half">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => modal.querySelector('#rename-input')?.focus(), 100);
        }

        async function saveRenamedFolder(folderId, btn) {
            const modal = btn.closest('.fixed');
            const newName = modal.querySelector('#rename-input').value.trim();
            if (!newName) return alert('Название не может быть пустым');
            const folder = folders.find(f => f.id === folderId);
            if (folder) folder.name = newName;
            if (currentFolderId === folderId) document.getElementById('current-folder-name').textContent = newName;
            await saveData();
            modal.remove();
            showFoldersView();
        }

        async function showFolderCards(folderId) {
            currentFolderId = folderId;
            const folder = getCurrentFolder();
            document.getElementById('current-folder-name').textContent = folder.name;
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="scrollable-content px-1 pt-2">
                    <div class="flex justify-between items-center mb-3">
                        <button onclick="showFoldersView()" class="text-sm text-teal-600 flex items-center gap-x-1 touch-target"><i class="fa-solid fa-arrow-left"></i> <span>Назад</span></button>
                        <button onclick="showAddCardModal()" class="px-4 py-2 bg-teal-600 text-white rounded-2xl text-sm flex items-center gap-x-2 touch-target"><i class="fa-solid fa-plus"></i> <span>Добавить</span></button>
                    </div>
                    ${folder.hidden ? `
                    <div class="mb-3 p-3 rounded-2xl border border-amber-200 dark:border-amber-800 bg-amber-50 dark:bg-amber-900/20 flex items-center justify-between gap-x-2">
                        <span class="text-sm text-amber-700 dark:text-amber-400 flex items-center gap-x-2"><i class="fa-solid fa-eye-slash"></i> Колода скрыта из изучения</span>
                        <button onclick="toggleFolderHidden('${folder.id}', event)" class="text-sm font-medium text-amber-700 dark:text-amber-400 underline touch-target">Показать</button>
                    </div>
                    ` : ''}
                    <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl overflow-hidden" id="card-list">
                        ${folder.cards.length === 0 ? `<div class="p-6 text-center text-slate-500 dark:text-slate-400">В этой колоде пока нет слов</div>` : ''}
                    </div>
                </div>
            `;

            // Рендер карточек через helper (для сокращения кода)
            if (folder.cards.length > 0) {
                const listContainer = document.getElementById('card-list');
                folder.cards.forEach(card => {
                    const row = createCardListRow(card);
                    listContainer.appendChild(row);
                });
            }
        }

        // ==================== ИЗУЧЕНИЕ ====================
        async function startStudy() {
            let cards = [];
            let sourceName = '';

            if (studyMode === 'selected') {
                if (!selectedFolderId) {
                    alert('Сначала выберите колоду для изучения.');
                    return;
                }
                const folder = folders.find(f => f.id === selectedFolderId);
                if (!folder || folder.hidden) {
                    alert('Выбранная колода скрыта или не существует. Выберите другую.');
                    selectedFolderId = null;
                    localStorage.removeItem('selectedFolderId');
                    showFoldersView();
                    return;
                }
                cards = folder.cards || [];
                sourceName = folder.name;
            } else {
                // Режим «Все колоды»
                const visibleFolders = folders.filter(f => !f.hidden && !f.system);
                cards = visibleFolders.flatMap(f => f.cards || []);
                cards = cards.map(c => {
                    const parent = visibleFolders.find(f => f.cards && f.cards.some(card => card.id === c.id));
                    return { ...c, folderName: parent ? parent.name : '' };
                });
                sourceName = 'Все колоды';
            }

            dueCards = getDueCardsFromArray(cards);

            if (dailyLimitEnabled && dueCards.length > dailyLimitCount) {
                dueCards = dueCards.slice(0, dailyLimitCount);
            }

            initialDueCount = dueCards.length;

            if (dueCards.length === 0) {
                showEmptyStudyState(sourceName);
                return;
            }

            currentCardIndex = 0;
            lastReviewedCard = null;
            sessionStableCandidates = [];
            showCurrentCard();
        }

        function showEmptyStudyState(sourceName) {
            const container = document.getElementById('main-content');
            if (!container) return;

            container.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[60vh] px-6 text-center">
                    <i class="fa-solid fa-check-circle text-7xl text-teal-500 mb-6"></i>
                    <div class="text-2xl font-semibold mb-3">Всё повторено!</div>
                    <div class="text-slate-500 dark:text-slate-400 max-w-xs mb-8">
                        В «${escapeHtml(sourceName)}» нет карточек для повторения на сегодня.
                    </div>
                    <button onclick="showFoldersView()" 
                            class="px-8 py-3.5 bg-teal-600 hover:bg-teal-700 active:bg-teal-800 text-white rounded-2xl font-medium text-base touch-target transition">
                        Вернуться к колодам
                    </button>
                </div>
            `;
        }

        function showCurrentCard() {
            // Освобождаем Object URL предыдущей карточки
            if (currentCardIndex > 0 && dueCards[currentCardIndex - 1]?._imageObjectUrl) {
                URL.revokeObjectURL(dueCards[currentCardIndex - 1]._imageObjectUrl);
                dueCards[currentCardIndex - 1]._imageObjectUrl = null;
            }

            const undoBtn = document.getElementById('undo-review-btn');

            if (currentCardIndex >= dueCards.length) {
                const container = document.getElementById('main-content');
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="text-center py-6">
                            <i class="fa-solid fa-check-circle text-5xl text-emerald-500 mb-3"></i>
                            <p class="text-xl font-semibold">Отлично! Все карточки повторены.</p>
                            <button onclick="showFoldersView()" class="mt-4 px-6 py-3 bg-teal-600 text-white rounded-2xl font-medium text-base touch-target">Вернуться к колодам</button>
                        </div>
                    </div>
                `;
                if (undoBtn && lastReviewedCard) {
                    undoBtn.style.display = 'flex';
                    undoBtn.classList.add('visible');
                } else if (undoBtn) {
                    undoBtn.classList.remove('visible');
                    undoBtn.style.display = 'none';
                }

                // Показываем предложение по стабильным словам в конце сессии
                if (sessionStableCandidates.length > 0) {
                    setTimeout(() => {
                        showEndOfSessionStableReview();
                    }, 600);
                }
                return;
            }

            const card = dueCards[currentCardIndex];

            let progressHtml = '';
            if (initialDueCount) {
                const done = currentCardIndex;
                const total = initialDueCount;
                const percent = Math.round((done / total) * 100);
                let limitText = '';
                if (dailyLimitEnabled) {
                    limitText = ` (лимит: ${dailyLimitCount})`;
                }
                progressHtml = `
                    <div class="progress-area px-1 mb-1">
                        <div class="flex justify-between items-center mb-1">
                            <span>Выполнено <b>${done}</b> из <b>${total}</b>${limitText}</span>
                            <span class="text-teal-600 font-semibold">${percent}%</span>
                        </div>
                        <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${percent}%"></div></div>
                    </div>
                `;
            }

            // Изображение рендерим placeholder'ом, реальный src подставим после отрисовки
            let imageHtml = '';
            if (card.imageId || (card.image && card.image.startsWith('data:image'))) {
                imageHtml = `
                    <div class="image-area relative" id="study-image-container">
                        <img id="study-card-image" 
                             onclick="uploadImageForCurrentCard(event)" 
                             class="w-full max-h-36 object-contain rounded-2xl cursor-pointer">
                    </div>`;
            } else {
                imageHtml = `<div id="study-image-container" onclick="uploadImageForCurrentCard(event)" class="image-placeholder">
                     <i class="fa-solid fa-camera text-lg"></i>
                     <span>Добавить фото</span>
                   </div>`;
            }

            let folderLabelHTML = '';
            if (studyMode === 'all' && card.folderName) {
                folderLabelHTML = `
                    <div class="absolute bottom-3 left-3 px-2 py-0.5 bg-slate-100 dark:bg-slate-700 text-xs text-slate-500 dark:text-slate-400 rounded-full">
                        ${escapeHtml(card.folderName)}
                    </div>
                `;
            }

            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="study-container">
                    ${progressHtml}
                    <div class="study-card-wrapper">
                        <div class="study-card card-enter" onclick="flipStudyCard()">
                            <button onclick="editCurrentStudyCard(event)"
                                    class="absolute top-3 right-3 w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 touch-target">
                                <i class="fa-solid fa-ellipsis-vertical text-xl"></i>
                            </button>
                            ${imageHtml}
                            <div id="card-front">
                                <div class="word-english">${escapeHtml(card.english)}</div>
                            </div>
                            <div id="card-back" class="hidden">
                                <div class="word-russian">${escapeHtml(card.russian)}</div>
                            </div>
                            <button onclick="event.stopImmediatePropagation(); speakCurrentWord()" class="speak-btn">
                                <i class="fa-solid fa-volume-up"></i>
                            </button>
                            ${folderLabelHTML}
                        </div>
                    </div>
                    <div class="rating-buttons">
                        <button onclick="rateCard(1)" class="rating-btn bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400">Снова<br><span class="text-xs opacity-70">Забыл</span></button>
                        <button onclick="rateCard(2)" class="rating-btn bg-orange-100 dark:bg-orange-900/40 text-orange-600 dark:text-orange-400">Трудно<br><span class="text-xs opacity-70">С усилием</span></button>
                        <button onclick="rateCard(3)" class="rating-btn bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-400">Хорошо<br><span class="text-xs opacity-70">Нормально</span></button>
                        <button onclick="rateCard(4)" class="rating-btn bg-teal-600 text-white">Легко<br><span class="text-xs opacity-80">Сразу вспомнил</span></button>
                    </div>
                </div>
            `;

            fitStudyCardContent();

            // Подгружаем изображение после отрисовки
            const imgContainer = document.getElementById('study-image-container');
            if (imgContainer) {
                // long-press меню для фото
                let pressTimer = null;
                const startPress = (e) => {
                    pressTimer = setTimeout(() => {
                        showImageActionMenu(card);
                    }, 550);
                };
                const cancelPress = () => { clearTimeout(pressTimer); };
                imgContainer.addEventListener('touchstart', startPress, { passive: true });
                imgContainer.addEventListener('touchend', cancelPress);
                imgContainer.addEventListener('touchmove', cancelPress);
                imgContainer.addEventListener('mousedown', startPress);
                imgContainer.addEventListener('mouseup', cancelPress);
                imgContainer.addEventListener('mouseleave', cancelPress);

                if (card.imageId || (card.image && card.image.startsWith('data:image'))) {
                    (async () => {
                        const src = await getCardImageSrc(card);
                        const imgEl = document.getElementById('study-card-image');
                        if (imgEl) {
                            if (src) {
                                imgEl.addEventListener('load', fitStudyCardContent, { once: true });
                                imgEl.addEventListener('error', fitStudyCardContent, { once: true });
                                imgEl.src = src;
                                card._imageObjectUrl = src;
                            } else {
                                imgEl.style.display = 'none';
                                imgContainer.innerHTML = `
                                    <div class="image-placeholder">
                                        <i class="fa-solid fa-image-slash text-lg"></i>
                                        <span>Изображение недоступно</span>
                                    </div>
                                `;
                                fitStudyCardContent();
                            }
                        }
                    })();
                }
            }

            if (undoBtn) {
                undoBtn.style.display = lastReviewedCard ? 'flex' : 'none';
                if (lastReviewedCard) undoBtn.classList.add('visible');
                else undoBtn.classList.remove('visible');
            }
        }

        // --- Меню действий с изображением (long-press) ---
        function showImageActionMenu(card) {
            const overlay = document.createElement('div');
            overlay.className = 'fixed inset-0 bg-black/40 flex items-end sm:items-center justify-center z-[200]';
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

            overlay.innerHTML = `
                <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-800 w-full sm:w-[320px] rounded-t-3xl sm:rounded-3xl p-2">
                    <div class="py-2 px-4 text-sm text-slate-500 dark:text-slate-400">Действия с фото</div>
                    <button onclick="changeCardImage('${card.id}'); this.closest('.fixed').remove();" 
                            class="menu-item">
                        <i class="fa-solid fa-edit w-5 text-teal-600"></i> 
                        <span>${card.imageId ? 'Изменить фото' : 'Добавить фото'}</span>
                    </button>
                    ${card.imageId ? `
                    <button onclick="removeCardImage('${card.id}'); this.closest('.fixed').remove();" 
                            class="w-full text-left px-4 py-3 rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center gap-x-3 text-base touch-target text-red-600">
                        <i class="fa-solid fa-trash w-5"></i> 
                        <span>Удалить фото</span>
                    </button>` : ''}
                    <button onclick="this.closest('.fixed').remove()" class="mt-2 w-full py-3 text-sm text-slate-500 dark:text-slate-400 touch-target">Отмена</button>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        async function changeCardImage(cardId) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async () => {
                if (!input.files[0]) return;
                const folder = getCurrentFolder();
                const card = folder.cards.find(c => c.id === cardId);
                if (!card) return;
                await compressAndSetImage(card, input.files[0]);
                await debouncedSaveData();
                if (dueCards.some(c => c.id === cardId)) showCurrentCard();
                else showFolderCards(currentFolderId);
            };
            input.click();
        }

        async function removeCardImage(cardId) {
            if (!confirm('Удалить фото?')) return;
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === cardId);
            if (!card) return;
            if (card.imageId) await MediaStore.deleteImage(card.imageId);
            if (card._imageObjectUrl) { URL.revokeObjectURL(card._imageObjectUrl); card._imageObjectUrl = null; }
            card.image = null;
            card.imageId = null;
            await debouncedSaveData();
            if (dueCards.some(c => c.id === cardId)) showCurrentCard();
            else showFolderCards(currentFolderId);
        }

        function speakCurrentWord() {
            const front = document.getElementById('card-front');
            const back = document.getElementById('card-back');
            if (!front || !back) return;
            if (!back.classList.contains('hidden')) {
                const russian = back.querySelector('.word-russian')?.textContent;
                if (russian) speakWord(russian);
            } else {
                const english = front.querySelector('.word-english')?.textContent;
                if (english) speakWord(english);
            }
        }

        function viewCard(cardId) {
            const folder = getCurrentFolder();
            const card = folder.cards.find(c => c.id === cardId);
            if (!card) return;
            viewingCardId = cardId;

            const content = document.getElementById('card-view-content');
            content.innerHTML = `
                <div class="study-card" style="cursor:default; min-height:200px;">
                    <div class="flex items-center justify-center gap-x-3">
                        <div class="word-english">${escapeHtml(card.english)}</div>
                        <button onclick="event.stopImmediatePropagation(); speakWord('${escJs(card.english)}')" class="speak-btn" style="margin-top:0;">
                            <i class="fa-solid fa-volume-up"></i>
                        </button>
                    </div>

        // Автоподбор размера текста (и, если этого мало, картинки) под карточку.
        // Работает для любой длины слова/фразы и любого сочетания с фото —
        // без обрезания текста и без прокрутки экрана.
        function fitStudyCardContent() {
            const cardEl = document.querySelector('.study-card');
            if (!cardEl) return;

            const isSmallScreen = window.innerWidth <= 480;
            const baseEnglish = isSmallScreen ? 2 : 2.5;   // rem
            const baseRussian = isSmallScreen ? 1.6 : 2;   // rem
            const baseImgHeight = 140;                     // px
            const minEnglish = 1.15, minRussian = 1.05, minImgHeight = 60;

            let scale = 1;
            cardEl.style.setProperty('--word-font-english', baseEnglish + 'rem');
            cardEl.style.setProperty('--word-font-russian', baseRussian + 'rem');
            cardEl.style.setProperty('--img-max-height', baseImgHeight + 'px');

            for (let step = 0; step < 18; step++) {
                if (cardEl.scrollHeight <= cardEl.clientHeight + 1) break;

                scale -= 0.06;
                if (scale <= 0.35) break; // не уменьшаем до нечитаемости

                const eng = Math.max(minEnglish, baseEnglish * scale);
                const rus = Math.max(minRussian, baseRussian * scale);
                cardEl.style.setProperty('--word-font-english', eng + 'rem');
                cardEl.style.setProperty('--word-font-russian', rus + 'rem');

                // Сначала ужимаем только текст; если пары шагов не хватило — начинаем
                // соразмерно уменьшать и картинку, чтобы всё вместе поместилось.
                if (step >= 3) {
                    const imgH = Math.max(minImgHeight, baseImgHeight * scale);
                    cardEl.style.setProperty('--img-max-height', imgH + 'px');
                }
            }
        }

        async function undoLastReview() {
            if (!lastReviewedCard) return;

            if (navigator.vibrate) navigator.vibrate(10);

            const { card: savedCard, index, statsSnapshot, dueCardsSnapshot, initialDueCountSnapshot } = lastReviewedCard;
            const folder = getCurrentFolder();
            let realCard = folder.cards.find(c => c.id === savedCard.id);

            if (!realCard) {
                const masteredFolder = getMasteredFolder();
                realCard = masteredFolder.cards.find(c => c.id === savedCard.id);
                if (realCard) {
                    masteredFolder.cards = masteredFolder.cards.filter(c => c.id !== savedCard.id);
                    folder.cards.push(realCard);
                }
            }

            if (realCard) {
                Object.assign(realCard, savedCard);
            }

            // Восстанавливаем статистику
            if (statsSnapshot) {
                Object.assign(stats, statsSnapshot);
                await saveStats();
            }

            // Восстанавливаем список dueCards и счётчик
            if (dueCardsSnapshot) {
                dueCards = dueCardsSnapshot;
            }
            if (initialDueCountSnapshot !== undefined) {
                initialDueCount = initialDueCountSnapshot;
            }

            currentCardIndex = index;
            lastReviewedCard = null;

            const undoBtn = document.getElementById('undo-review-btn');
            if (undoBtn) {

                undoBtn.style.display = 'none';

            showCurrentCard();

        // --- Улучшенный парсер импорта ---
        function parseImportText(text) {
            if (!text || typeof text !== 'string') return [];
            const trimmed = text.trim();
            if (!trimmed) return [];
            const cards = [];
            const lines = trimmed.split(/\r?\n/);
            let current = null;
            let lastHeader = null;

            for (let i = 0; i < lines.length; i++) {
                const raw = lines[i];
                const t = raw.trim();

                if (!t && !current) continue;

                const frontMatch = t.match(/^Front:\s*(.*)/i);
                const backMatch = t.match(/^Back:\s*(.*)/i);

                if (frontMatch) {
                    if (current && current.front && current.back) {
                        cards.push({ english: current.front.trim(), russian: current.back.trim() });
                    }
                    current = { front: frontMatch[1] || '', back: '' };
                    lastHeader = 'front';
                } else if (backMatch) {
                    if (!current) current = { front: '', back: '' };
                    current.back = backMatch[1] || '';
                    lastHeader = 'back';
                } else if (current && lastHeader) {
                    if (lastHeader === 'front') {
                        current.front += (current.front ? '\n' : '') + t;
                    } else if (lastHeader === 'back') {
                        current.back += (current.back ? '\n' : '') + t;
                    }
                }
            }

            if (current && current.front && current.back) {
                cards.push({ english: current.front.trim(), russian: current.back.trim() });
            }

            // Fallbacks (обратная совместимость)
            if (cards.length === 0) {
                const sepPattern = /[—–\-:→=>]\s*/;
                for (const line of lines) {
                    const t = line.trim();
                    if (!t) continue;
                    const sepMatch = t.match(sepPattern);
                    if (sepMatch) {
                        const idx = t.indexOf(sepMatch[0]);
                        const eng = t.slice(0, idx).trim();
                        const rus = t.slice(idx + sepMatch[0].length).trim();
                        if (eng && rus) cards.push({ english: eng, russian: rus });
                    } else if (t.includes('\t')) {
                        const parts = t.split('\t');
                        if (parts.length >= 2 && parts[0].trim() && parts[1].trim()) {
                            cards.push({ english: parts[0].trim(), russian: parts[1].trim() });
                        }
                    }
                }
            }

            if (cards.length === 0) {
                const blocks = trimmed.split(/\n\s*\n/);
                for (const block of blocks) {
                    const bl = block.split('\n').map(l => l.trim()).filter(Boolean);
                    if (bl.length >= 2) cards.push({ english: bl[0], russian: bl[1] });
                }
            }

            return cards;
        }

        // --- Дедупликация ---
        function findDuplicates(newCards, existingCards) {
            const existingSet = new Set(
                existingCards.map(c => 
                    `${(c.english || '').toLowerCase().trim()}|${(c.russian || '').toLowerCase().trim()}`
                )
            );
            const duplicates = [];
            const unique = [];
            for (const card of newCards) {
                const key = `${(card.english || '').toLowerCase().trim()}|${(card.russian || '').toLowerCase().trim()}`;
                if (existingSet.has(key)) {
                    duplicates.push(card);
                } else {
                    unique.push(card);
                    existingSet.add(key);
                }
            }
            return { duplicates, unique };
        }

        // --- Обновлённый импорт с дедупликацией ---
        async function importWords() {
            const text = document.getElementById('import-text').value.trim();
            const folderId = document.getElementById('import-folder-select').value;
            const folder = folders.find(f => f.id === folderId);
            if (!text || !folder) return alert('Введите текст и выберите колоду');

            const newCards = parseImportText(text);
            if (newCards.length === 0) {
                return alert('Не удалось распознать ни одной карточки. Проверьте формат.');
            }

            const cardsToAdd = newCards.map(c => ({
                id: 'card_' + Date.now() + Math.random(),
                english: c.english,
                russian: c.russian,
                image: null,
                imageId: null,
                ...makeFreshCardProgress()
            }));

            const { duplicates, unique } = findDuplicates(cardsToAdd, folder.cards);

            if (duplicates.length > 0) {
                alert(`Найдено ${duplicates.length} дублирующихся карточек. Они пропущены.`);
            }
            if (unique.length === 0) {
                alert('Нет новых уникальных карточек для добавления.');
                return;
            }

            folder.cards.push(...unique);
            await saveData();
            document.getElementById('import-text').value = '';
            alert(`Импортировано ${unique.length} слов (${duplicates.length} пропущено дублей)`);
            showFolderCards(folderId);
            await checkAchievements();
        }

        // ==================== Защищённый импорт данных ====================
        async function importData(jsonString) {
            try {
                const imported = JSON.parse(jsonString);

                if (!Array.isArray(imported)) {
                    throw new Error('Файл должен содержать массив колод');
                }

                if (imported.some(f => !f.id || !f.name || !Array.isArray(f.cards))) {
                    throw new Error('Неверный формат данных (отсутствуют обязательные поля)');
                }

                const shouldReplace = confirm(
                    'Заменить все текущие данные?\n\n' +
                    'OK — заменить все данные\n' +
                    'Отмена — добавить колоды к существующим'
                );

                if (shouldReplace) {
                    folders = imported;
                } else {
                    // Перегенерируем ID, чтобы избежать конфликтов
                    regenerateImportedIds(imported);
                    folders = folders.concat(imported);
                }

                // Удаляем дублирующиеся системные папки
                deduplicateSystemFolders();

                // Дедупликация внутри каждой колоды (при добавлении)
                if (!shouldReplace) {
                    folders.forEach(folder => {
                        if (!folder.cards) return;
                        const map = new Map();
                        const unique = [];
                        folder.cards.forEach(card => {
                            const key = `${(card.english||'').toLowerCase().trim()}|${(card.russian||'').toLowerCase().trim()}`;
                            if (!map.has(key)) {
                                map.set(key, true);
                                unique.push(card);
                            }
                        });
                        folder.cards = unique;
                    });
                }

                validateAndRepairData();
                await migrateOldBase64Images();
                await saveData();
                alert('Данные успешно импортированы');
                showFoldersView();
                await checkAchievements();

            } catch (err) {
                console.error('Ошибка импорта:', err);
                alert('Ошибка импорта: ' + err.message + '\n\nПроверьте файл и попробуйте снова.');
            }
        }

            const input = document.getElementById('import-file-input');

            if (!file) return alert('Выберите файл');

            const reader = new FileReader();
            reader.onload = async (e) => {
                await importData(e.target.result);
            };
            reader.readAsText(file);
        }

        async function confirmDeleteFolder(folderId) {
